// ══════════════════════════════════════════════════════════════════════
// IMAGE CROPPER
// ══════════════════════════════════════════════════════════════════════
let _cropTarget = null;   // 'avatar' | 'banner'
let _cropImg    = null;   // HTMLImageElement (full source)
let _cx = 0, _cy = 0;    // image centre in canvas CSS pixels
let _scale = 1, _minScale = 1;
let _drag = false, _lastX = 0, _lastY = 0;
let _pinchDist = 0, _activeTouches = [];

function triggerCrop(target){
  _cropTarget = target;
  const inp = document.getElementById('crop-file-input');
  if(inp){ inp.value=''; inp.click(); }
}

function onCropFileChosen(e){
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => { _cropImg = img; _openCropOverlay(); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function _openCropOverlay(){
  _closeCropOverlay();
  const isAvatar = _cropTarget === 'avatar';

  const overlay = document.createElement('div');
  overlay.id = 'crop-overlay';
  overlay.innerHTML = `
    <div class="crop-header">
      <div>
        <div class="crop-title">${isAvatar ? 'Crop Profile Photo' : 'Crop Header Image'}</div>
        <div class="crop-hint">Drag · Pinch to zoom · Slider below</div>
      </div>
    </div>
    <div id="crop-wrap" style="flex-shrink:0"><canvas id="crop-canvas" style="display:block;touch-action:none;cursor:grab"></canvas></div>
    <div style="padding:.5rem 1rem 0;max-width:560px;width:100%;box-sizing:border-box">
      <input type="range" id="crop-zoom" min="100" max="400" value="100" style="width:100%"/>
    </div>
    <div class="crop-footer">
      <button class="crop-btn-cancel" onclick="_closeCropOverlay()">Cancel</button>
      <button class="crop-btn-apply" onclick="_applyCrop()">Use This ${isAvatar?'Photo':'Image'}</button>
    </div>`;
  document.body.appendChild(overlay);

  // Compute canvas size from the actual rendered wrap width (avoids off-center on mobile)
  const wrap   = document.getElementById('crop-wrap');
  const canvas = document.getElementById('crop-canvas');
  const dpr    = window.devicePixelRatio || 1;

  // Use actual rendered wrap width; fall back to innerWidth - 32
  const cw = Math.round(wrap.getBoundingClientRect().width || Math.min(window.innerWidth - 32, 560));
  let ch;
  if(isAvatar){ ch = cw; }
  else { ch = Math.round(cw * (88/480)); ch = Math.max(ch, 80); ch = ch * 3; }

  canvas.width  = Math.round(cw * dpr);
  canvas.height = Math.round(ch * dpr);
  canvas.style.width  = cw + 'px';
  canvas.style.height = ch + 'px';

  // Init scale/position — mirror desktop _cropSrc.onload
  const cropW = cw;
  const cropH = isAvatar ? ch : Math.round(ch / 3);
  const scaleX = cropW / _cropImg.naturalWidth;
  const scaleY = cropH / _cropImg.naturalHeight;
  _minScale = Math.max(scaleX, scaleY);
  _scale    = _minScale;
  _cx = cw / 2;
  _cy = ch / 2;
  const slider = document.getElementById('crop-zoom');
  if(slider){ slider.min=100; slider.max=400; slider.value=100; }
  _drawCrop();

  slider.addEventListener('input', e => {
    _scale = _minScale * (e.target.value / 100);
    _clampCropPos(); _drawCrop();
  });

  wrap.addEventListener('mousedown',   _cpDown);
  wrap.addEventListener('mousemove',   _cpMove);
  wrap.addEventListener('mouseup',     _cpUp);
  wrap.addEventListener('mouseleave',  _cpUp);
  wrap.addEventListener('wheel',       _cpWheel, {passive:false});
  wrap.addEventListener('touchstart',  _cpTouchStart, {passive:false});
  wrap.addEventListener('touchmove',   _cpTouchMove,  {passive:false});
  wrap.addEventListener('touchend',    _cpTouchEnd);
  wrap.addEventListener('touchcancel', _cpTouchEnd);
}

function _closeCropOverlay(){
  const el = document.getElementById('crop-overlay');
  if(el) el.remove();
}

function _drawCrop(){
  const canvas = document.getElementById('crop-canvas');
  if(!canvas || !_cropImg) return;
  const dpr = window.devicePixelRatio || 1;
  const cw = canvas.width / dpr, ch = canvas.height / dpr;
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const isAvatar = _cropTarget === 'avatar';

  const _rrect = (x, y, w, h, r) => {
    ctx.beginPath();
    ctx.moveTo(x+r, y);
    ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
    ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
    ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
    ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
    ctx.closePath();
  };

  // Step 1: full image dimmed
  ctx.save();
  ctx.translate(_cx, _cy); ctx.scale(_scale, _scale);
  ctx.drawImage(_cropImg, -_cropImg.naturalWidth/2, -_cropImg.naturalHeight/2);
  ctx.restore();

  // Step 2: dim overlay
  ctx.globalAlpha = 0.62;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, cw, ch);
  ctx.globalAlpha = 1;

  // Step 3: bright crop zone clipped to rounded rect
  const cropStripH = isAvatar ? ch : Math.round(ch / 3);
  const cropStripY = isAvatar ? 0 : (ch - cropStripH) / 2;

  ctx.save();
  if(isAvatar){
    const s = Math.min(cw, ch);
    const x = (cw-s)/2, y = (ch-s)/2;
    _rrect(x, y, s, s, s*0.25); ctx.clip();
  } else {
    const r = 20;
    _rrect(0, cropStripY, cw, cropStripH, r); ctx.clip();
  }
  ctx.translate(_cx, _cy); ctx.scale(_scale, _scale);
  ctx.drawImage(_cropImg, -_cropImg.naturalWidth/2, -_cropImg.naturalHeight/2);
  ctx.restore();

  // Step 4: border around crop zone
  if(isAvatar){
    const s = Math.min(cw, ch);
    const x = (cw-s)/2, y = (ch-s)/2;
    _rrect(x, y, s, s, s*0.25);
    ctx.strokeStyle = 'rgba(255,255,255,.3)'; ctx.lineWidth = 2; ctx.stroke();
  } else {
    const r = 20;
    _rrect(0.75, cropStripY+0.75, cw-1.5, cropStripH-1.5, r);
    ctx.strokeStyle = 'rgba(255,255,255,.4)'; ctx.lineWidth = 1.5; ctx.stroke();
  }
}

function _clampCropPos(){
  const canvas = document.getElementById('crop-canvas');
  if(!canvas || !_cropImg) return;
  const dpr = window.devicePixelRatio || 1;
  const cw = canvas.width/dpr, ch = canvas.height/dpr;
  const isAvatar = _cropTarget === 'avatar';
  const cropW = cw;
  const cropH = isAvatar ? ch : Math.round(ch / 3);
  const cropX = 0;
  const cropY = isAvatar ? 0 : (ch - cropH) / 2;
  const hw = (_cropImg.naturalWidth  * _scale) / 2;
  const hh = (_cropImg.naturalHeight * _scale) / 2;
  _cx = Math.min(Math.max(_cx, cropX + cropW - hw), cropX + hw);
  _cy = Math.min(Math.max(_cy, cropY + cropH - hh), cropY + hh);
}

function _applyCrop(){
  const canvas = document.getElementById('crop-canvas');
  if(!canvas || !_cropImg) return;
  const dpr = window.devicePixelRatio || 1;
  const cw = canvas.width/dpr, ch = canvas.height/dpr;
  const isAvatar = _cropTarget === 'avatar';

  const outW = isAvatar ? 400 : 960;
  const outH = isAvatar ? 400 : Math.round(960 * (88/480));
  const out  = document.createElement('canvas');
  out.width  = outW; out.height = outH;
  const octx = out.getContext('2d');

  // For banner: offset _cy to export only the center strip (matching desktop)
  const exportCy = isAvatar ? _cy : _cy - (ch - Math.round(ch/3)) / 2;
  const scaleRatio = outW / cw;

  octx.save();
  if(isAvatar){
    const cr = outW * 0.25;
    octx.beginPath();
    octx.moveTo(cr, 0);
    octx.lineTo(outW-cr, 0); octx.quadraticCurveTo(outW, 0, outW, cr);
    octx.lineTo(outW, outH-cr); octx.quadraticCurveTo(outW, outH, outW-cr, outH);
    octx.lineTo(cr, outH); octx.quadraticCurveTo(0, outH, 0, outH-cr);
    octx.lineTo(0, cr); octx.quadraticCurveTo(0, 0, cr, 0);
    octx.closePath(); octx.clip();
  }
  octx.translate(_cx * scaleRatio, exportCy * scaleRatio);
  octx.scale(_scale * scaleRatio, _scale * scaleRatio);
  octx.drawImage(_cropImg, -_cropImg.naturalWidth/2, -_cropImg.naturalHeight/2);
  octx.restore();

  const dataURL = out.toDataURL('image/jpeg', 0.92);
  if(isAvatar) currentUser.avatar = dataURL; else currentUser.banner = dataURL;
  const u = users.find(u => u.id === currentUser.id);
  if(u){ if(isAvatar) u.avatar = dataURL; else u.banner = dataURL; }
  syncUserToDb(currentUser);
  _closeCropOverlay();
  render();
}

// Mouse handlers
function _cpDown(e){ _drag=true; _lastX=e.clientX; _lastY=e.clientY; }
function _cpMove(e){
  if(!_drag) return;
  _cx += e.clientX-_lastX; _cy += e.clientY-_lastY;
  _lastX=e.clientX; _lastY=e.clientY; _clampCropPos(); _drawCrop();
}
function _cpUp(){ _drag=false; }
function _cpWheel(e){
  e.preventDefault();
  _scale = Math.max(_minScale, _scale * (e.deltaY>0 ? 0.92 : 1.09));
  const sl=document.getElementById('crop-zoom');
  if(sl){ sl.value=Math.round(Math.min(400,Math.max(100,_scale/_minScale*100))); }
  _clampCropPos(); _drawCrop();
}
function _ptDist(t1,t2){ const dx=t1.clientX-t2.clientX,dy=t1.clientY-t2.clientY; return Math.sqrt(dx*dx+dy*dy); }
function _cpTouchStart(e){
  e.preventDefault(); _activeTouches=Array.from(e.touches);
  if(_activeTouches.length===1){ _drag=true; _lastX=_activeTouches[0].clientX; _lastY=_activeTouches[0].clientY; }
  else if(_activeTouches.length===2){ _drag=false; _pinchDist=_ptDist(_activeTouches[0],_activeTouches[1]); }
}
function _cpTouchMove(e){
  e.preventDefault(); _activeTouches=Array.from(e.touches);
  if(_activeTouches.length===1&&_drag){
    _cx+=_activeTouches[0].clientX-_lastX; _cy+=_activeTouches[0].clientY-_lastY;
    _lastX=_activeTouches[0].clientX; _lastY=_activeTouches[0].clientY; _clampCropPos(); _drawCrop();
  } else if(_activeTouches.length===2&&_pinchDist>0){
    const d=_ptDist(_activeTouches[0],_activeTouches[1]);
    _scale=Math.max(_minScale, _scale*(d/_pinchDist));
    const sl=document.getElementById('crop-zoom');
    if(sl){ sl.value=Math.round(Math.min(400,Math.max(100,_scale/_minScale*100))); }
    _pinchDist=d; _clampCropPos(); _drawCrop();
  }
}
function _cpTouchEnd(e){
  _activeTouches=Array.from(e.touches);
  if(!_activeTouches.length){ _drag=false; _pinchDist=0; }
  else if(_activeTouches.length===1){ _drag=true; _lastX=_activeTouches[0].clientX; _lastY=_activeTouches[0].clientY; _pinchDist=0; }
}



// ── Drag-to-dismiss for detail bottom sheet ──────────────────────────
function attachDetailDrag(){
  const sh = document.querySelector('.detail-modal');
  const ov = document.querySelector('.overlay-detail');
  if(!sh || !ov) return;

  const THRESHOLD = 0.42; // fraction of sheet height to trigger close
  const VELOCITY  = 0.5;  // px/ms — fast flick always closes
  let startY = 0, currentY = 0, startTime = 0, dragging = false, sheetH = 0;

  function dragStart(clientY){
    sheetH   = sh.offsetHeight;
    startY   = clientY;
    currentY = 0;
    startTime = Date.now();
    dragging = true;
    sh.style.transition = 'none';
    ov.style.transition  = 'none';
  }

  function dragMove(clientY){
    if(!dragging) return;
    const dy = clientY - startY;
    if(dy < 0){ sh.style.transform = ''; return; }
    currentY = dy;
    sh.style.transform = 'translateY('+dy+'px)';
    const p = Math.min(dy / sheetH, 1);
    ov.style.background = 'rgba(0,0,0,'+(0.6*(1-p*0.85))+')';
  }

  function dragEnd(){
    if(!dragging) return;
    dragging = false;
    const elapsed  = Math.max(1, Date.now() - startTime);
    const velocity = currentY / elapsed;
    const dismiss  = currentY > sheetH * THRESHOLD || velocity > VELOCITY;
    if(dismiss){
      sh.style.transition = 'transform 0.26s cubic-bezier(0.4,0,1,1)';
      ov.style.transition  = 'opacity 0.26s ease';
      sh.style.transform   = 'translateY('+sheetH+'px)';
      ov.style.opacity     = '0';
      setTimeout(closeModal, 240);
    } else {
      sh.style.transition = 'transform 0.32s cubic-bezier(0.22,1,0.36,1)';
      ov.style.transition  = 'background 0.32s ease';
      sh.style.transform   = '';
      ov.style.background  = '';
    }
  }

  // Touch — attach to whole sheet, but only trigger from top zone or when not scrolled
  function onTouchStart(e){
    const body = sh.querySelector('.detail-modal-body');
    if(body && body.scrollTop > 4) return; // let scroll handle it
    const rect = sh.getBoundingClientRect();
    const fromTop = e.touches[0].clientY - rect.top;
    if(fromTop > 100) return; // only top 100px initiates drag
    dragStart(e.touches[0].clientY);
  }
  function onTouchMove(e){
    if(!dragging) return;
    if(currentY > 8) e.preventDefault();
    dragMove(e.touches[0].clientY);
  }
  function onTouchEnd(){ dragEnd(); }

  sh.addEventListener('touchstart', onTouchStart, {passive:true});
  sh.addEventListener('touchmove',  onTouchMove,  {passive:false});
  sh.addEventListener('touchend',   onTouchEnd,   {passive:true});
}

// ── Toast notification ─────────────────────────────────────────────
let _toastTimer = null;
function showToast(msg, type){
  // type: 'ok' (default green) | 'err' (red) | 'info' (accent)
  let el = document.getElementById('ft-toast');
  if(!el){
    el = document.createElement('div');
    el.id = 'ft-toast';
    el.style.cssText = 'position:fixed;bottom:calc(72px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(12px);z-index:10000;pointer-events:none;transition:opacity .22s ease,transform .22s ease;opacity:0;max-width:calc(100vw - 2rem);white-space:nowrap';
    document.body.appendChild(el);
  }
  const color = type==='err' ? '#ef4444' : type==='info' ? 'var(--accent2)' : '#22c55e';
  const iconSVG = type==='err'
    ? '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
    : '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>';
  el.innerHTML = `<div style="display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid ${color}44;border-left:3px solid ${color};border-radius:10px;padding:9px 16px;box-shadow:0 8px 28px rgba(0,0,0,.45);color:var(--text);font-size:13px;font-weight:600"><span style="color:${color};display:flex;align-items:center">${iconSVG}</span>${msg}</div>`;
  if(_toastTimer) clearTimeout(_toastTimer);
  el.style.opacity = '1';
  el.style.transform = 'translateX(-50%) translateY(0)';
  _toastTimer = setTimeout(()=>{
    el.style.opacity = '0';
    el.style.transform = 'translateX(-50%) translateY(12px)';
  }, 2500);
}

render();
</script>
</body>
</html>
