<style>
/* ============================================================
   SECTION 2 — GLOBAL STYLES, THEME TOKENS & MOBILE OVERRIDES
   Dark/light CSS custom properties identical to desktop.
   Key MOBILE-SPECIFIC additions over the desktop stylesheet:
     • Modals render as full-screen bottom sheets (slide up).
     • Scan landing page is full-screen with no side padding.
     • Auth box is full-width.
     • Table uses horizontal scroll with sticky first column.
     • Autocomplete dropdowns use wider min-width.
   @media print hides everything except the QR print area.
   ============================================================ */
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#07090f;--surface:#0d1120;--surface2:#131829;--border:#1e2640;
    --accent:#c9a227;--accent2:#f0c84a;--text:#eaecf4;--muted:#7880a0;
    --green:#22c55e;--amber:#f59e0b;--red:#ef4444;
    --radius:16px;--font:'Segoe UI',system-ui,sans-serif;
    --shadow-sm:0 2px 8px rgba(0,0,0,.4);
    --shadow-md:0 8px 32px rgba(0,0,0,.55);
    --shadow-lg:0 24px 64px rgba(0,0,0,.7);
    --blur:blur(20px)
  }
  :root.light{
    --bg:#f0f2f8;--surface:#ffffff;--surface2:#e8ebf4;--border:#d0d6e8;
    --accent:#b8911f;--accent2:#c9a227;--text:#111827;--muted:#5a6380;
    --green:#16a34a;--amber:#d97706;--red:#dc2626;
    --shadow-sm:0 2px 8px rgba(0,0,0,.08);
    --shadow-md:0 8px 32px rgba(0,0,0,.12);
    --shadow-lg:0 24px 64px rgba(0,0,0,.18)
  }
  *{box-sizing:border-box}
  html,body{height:100%;height:100dvh}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;min-height:100dvh;font-size:14px}
  button{cursor:pointer;border:none;font-family:inherit;font-size:14px;transition:all .18s ease}
  input,select,textarea{font-family:inherit;font-size:14px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:10px 14px;width:100%;outline:none;transition:border .2s,box-shadow .2s}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent)22}
  input:-webkit-autofill,input:-webkit-autofill:hover,input:-webkit-autofill:focus,input:-webkit-autofill:active{
    -webkit-box-shadow:0 0 0 1000px var(--surface2) inset!important;
    box-shadow:0 0 0 1000px var(--surface2) inset!important;
    -webkit-text-fill-color:var(--text)!important;
    caret-color:var(--text);
    transition:background-color 5000s ease-in-out 0s;
  }
  select option{background:var(--surface)}

  /* AUTH */
  .auth-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
  .auth-box{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:2.5rem;width:100%;max-width:400px;box-shadow:var(--shadow-md)}
  .logo{font-size:26px;font-weight:700;letter-spacing:-1px;margin-bottom:4px}
  .logo span{color:var(--accent)}
  .auth-sub{color:var(--muted);font-size:13px;margin-bottom:2rem}
  .auth-tabs{display:flex;gap:8px;margin-bottom:1.5rem}
  .tab-btn{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-weight:500;transition:.2s}
  .tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .field{margin-bottom:1rem}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
  .btn-primary{width:100%;padding:11px;border-radius:8px;background:var(--accent);color:#fff;font-weight:600;font-size:14px;margin-top:.5rem;transition:.15s}
  .btn-primary:hover{background:#a8841e}
  .err{color:var(--red);font-size:12px;margin-top:.5rem}
  .ok-msg{color:var(--green);font-size:12px;margin-top:.5rem}
  /* Email field with fixed domain */
  .email-wrap{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border .2s,box-shadow .2s}
  .email-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent)22}
  .email-wrap input{background:transparent;border:none;border-radius:0;padding:10px 0 10px 14px;flex:1;min-width:0;outline:none;box-shadow:none!important}
  .email-wrap input:focus{border:none;box-shadow:none}
  .email-suffix{flex-shrink:0;padding:10px 14px 10px 2px;font-size:13px;color:var(--accent2);font-weight:600;white-space:nowrap;user-select:none;-webkit-user-select:none;pointer-events:none}
  .app{display:flex;height:100vh;height:100dvh;overflow:hidden}

  /* ── SIDEBAR EXPANDED ── */
  /* ── SIDEBAR ── */
  .sidebar{
    width:224px;background:var(--surface);border-right:1px solid var(--border);
    display:flex;flex-direction:column;flex-shrink:0;position:relative;
    height:100%;
    transition:width .3s cubic-bezier(.4,0,.2,1);overflow:hidden
  }
  .sidebar.collapsed{width:64px;cursor:pointer}

  /* inner is always 224px wide — sidebar clips it via overflow:hidden */
  .sidebar-inner{
    width:224px;flex-shrink:0;
    display:flex;flex-direction:column;height:100%;
    padding:1rem .75rem;gap:2px;
  }

  /* ── Logo row (holds logo + toggle inline) ── */
  .sidebar-logo{
    display:flex;align-items:center;gap:8px;
    padding:.3rem .25rem;margin-bottom:.75rem;
    min-height:38px;flex-shrink:0;overflow:hidden;
  }
  .sidebar-logo .logo-icon{
    width:30px;height:30px;flex-shrink:0;
    background:var(--accent)22;border:1.5px solid var(--accent)55;
    border-radius:9px;display:flex;align-items:center;justify-content:center
  }
  .sidebar-logo .logo-icon svg{width:16px;height:16px;color:var(--accent)}
  .sidebar-logo .logo-text{
    flex:1;font-size:18px;font-weight:700;letter-spacing:-.5px;white-space:nowrap;
    overflow:hidden;transition:opacity .2s ease;
  }
  .sidebar-logo .logo-text span{color:var(--accent)}
  .sidebar.collapsed .logo-text{opacity:0;pointer-events:none}

  /* ── Toggle button — inline flex item, never overlaps ── */
  .sidebar-toggle{
    width:26px;height:26px;border-radius:8px;padding:0;flex-shrink:0;
    background:var(--surface2);border:1px solid var(--border);
    color:var(--muted);display:flex;align-items:center;justify-content:center;
    cursor:pointer;z-index:1;
    transition:background .15s,color .15s,border-color .15s
  }
  .sidebar-toggle svg{
    width:13px;height:13px;
    transition:transform .3s cubic-bezier(.4,0,.2,1)
  }
  .sidebar-toggle:hover{background:var(--border);color:var(--text);border-color:var(--muted)}
  .sidebar.collapsed .sidebar-toggle svg{transform:rotate(180deg)}

  /* ── Nav items ── */
  .nav-item{
    display:flex;align-items:center;gap:10px;
    padding:9px 10px;border-radius:10px;margin-bottom:1px;
    color:var(--muted);cursor:pointer;
    font-size:13.5px;font-weight:500;white-space:nowrap;
    position:relative;
    transition:background .15s,color .15s
  }
  .nav-item:hover{background:var(--surface2);color:var(--text)}
  .nav-item.active{background:var(--accent)1a;color:var(--accent2)}
  .nav-item.active::before{
    content:'';position:absolute;left:0;top:20%;bottom:20%;
    width:3px;border-radius:0 3px 3px 0;background:var(--accent2)
  }
  .nav-item svg{width:18px;height:18px;flex-shrink:0}
  .nav-item .nav-label{overflow:hidden;transition:opacity .15s ease}
  .sidebar.collapsed .nav-label{opacity:0;pointer-events:none}

  /* tooltip on collapsed hover */
  .sidebar.collapsed .nav-item:hover::after{
    content:attr(data-label);
    position:absolute;left:calc(100% + 8px);top:50%;transform:translateY(-50%);
    background:var(--surface2);border:1px solid var(--border);
    color:var(--text);font-size:12px;font-weight:500;
    padding:5px 11px;border-radius:8px;
    white-space:nowrap;z-index:999;pointer-events:none;
    box-shadow:0 6px 18px rgba(0,0,0,.45)
  }

  /* ── Bottom user area ── */
  .sidebar-bottom{
    margin-top:auto;padding-top:.5rem;
    border-top:1px solid rgba(255,255,255,.06);
    flex-shrink:0;
  }
  .user-pill{
    display:flex;align-items:center;gap:10px;
    padding:8px 10px;border-radius:12px;cursor:default;
    transition:background .15s;position:relative;
    margin:0 2px;
  }
  .user-pill:hover{background:var(--surface2)}
  /* collapsed: center just the avatar */
  .sidebar.collapsed .user-pill{
    justify-content:center;padding:8px 0;margin:0;
  }
  .avatar{
    width:36px;height:36px;border-radius:10px;flex-shrink:0;
    background:linear-gradient(135deg,var(--accent) 0%,#f0c84a 100%);
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:13px;color:#fff;
    box-shadow:0 2px 10px rgba(109,40,217,.35);
    transition:box-shadow .15s;
  }
  .user-pill:hover .avatar{box-shadow:0 4px 14px rgba(109,40,217,.45)}
  .user-pill-info{
    flex:1;min-width:0;overflow:hidden;
    transition:opacity .2s ease,width .3s cubic-bezier(.4,0,.2,1);
    width:120px;
  }
  .sidebar.collapsed .user-pill-info{opacity:0;width:0;pointer-events:none}
  .user-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
  .user-role{font-size:10.5px;color:var(--muted);white-space:nowrap;text-transform:capitalize;letter-spacing:.2px}
  .logout-btn{
    background:transparent;border:none;color:var(--muted);
    width:26px;height:26px;border-radius:7px;flex-shrink:0;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:color .15s,background .15s,opacity .2s;
  }
  .logout-btn svg{width:14px;height:14px}
  .logout-btn:hover{color:var(--red);background:rgba(239,68,68,.1)}
  .sidebar.collapsed .logout-btn{opacity:0;width:0;pointer-events:none;overflow:hidden}

  .main{flex:1;padding:2rem;overflow:auto;min-width:0}

  /* CASE TYPE TAGS */
  .case-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px;cursor:default;user-select:none;text-transform:uppercase}
  .tag-criminal{background:#3b3b4f;color:#c7c7e0;border:1px solid #4a4a60}
  .tag-civil{background:#fce7f3;color:#be185d;border:1px solid #fbcfe8}
  .tag-labor{background:#ffe4e6;color:#be123c;border:1px solid #fecdd3}
  .tag-land{background:#e0f2fe;color:#0369a1;border:1px solid #bae6fd}
  .tag-admin{background:#fdf4ff;color:#a21caf;border:1px solid #f0abfc}
  .tag-spl{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
  .tag-others{background:#1c1c1c;color:#d4d4d4;border:1px solid #3a3a3a}
  .tag-special{background:#fefce8;color:#854d0e;border:1px solid #fde68a}
  .tag-pcab{background:#ede9fe;color:#5b21b6;border:1px solid #ddd6fe}

  /* TAG DROPDOWN */
  .tag-wrap{position:relative;display:inline-block}
  .tag-dropdown{position:absolute;top:calc(100% + 6px);left:0;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:8px;z-index:50;min-width:200px;box-shadow:0 12px 36px rgba(0,0,0,.5);display:none}
  .tag-wrap:focus-within .tag-dropdown,.tag-dropdown.open{display:block}
  .tag-dropdown .case-tag{display:block;margin:3px 0;width:100%;text-align:left;padding:6px 12px;cursor:pointer;transition:.15s;border-radius:8px}
  .tag-dropdown .case-tag:hover{filter:brightness(1.15)}
  .tag-edit-btn{background:transparent;border:none;color:var(--muted);font-size:13px;padding:2px 6px;border-radius:4px;cursor:pointer;vertical-align:middle}
  .tag-edit-btn:hover{color:var(--text)}
  .page-title{font-size:22px;font-weight:700;letter-spacing:-.5px;margin-bottom:.25rem}
  .page-sub{color:var(--muted);margin-bottom:1.5rem;font-size:13px}

  /* STATS */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1.25rem}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:1.1rem 1.4rem;box-shadow:var(--shadow-sm);transition:transform .2s ease,box-shadow .2s ease}
  .stat:hover{transform:translateY(-1px);box-shadow:var(--shadow-md)}
  .stat-val{font-size:28px;font-weight:700;letter-spacing:-1px}
  .stat-label{font-size:12px;color:var(--muted);margin-top:2px}

  /* TABLE */
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:var(--shadow-sm)}
  .table-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1px solid var(--border)}
  .table-title{font-weight:600;font-size:15px}
  .btn-sm{padding:8px 16px;border-radius:10px;background:var(--accent);color:#fff;font-weight:600;font-size:13px;white-space:nowrap;box-shadow:0 2px 8px var(--accent)44}
  .btn-sm:hover{background:#b8941e;box-shadow:0 4px 14px var(--accent)55;transform:translateY(-1px)}
  .filters{display:flex;gap:.75rem;padding:.75rem 1.25rem;border-bottom:1px solid var(--border);background:var(--surface2)}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;padding:10px 16px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border);font-weight:600;background:var(--surface2)}
  td{padding:14px 16px;border-bottom:1px solid var(--border)44;font-size:13px;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:var(--surface2)55}

  /* Solid status badges like the screenshot */
  .badge{display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.2px}
  .badge-available{background:#16a34a;color:#fff}
  .badge-borrowed{background:#b45309;color:#fff}
  .badge-overdue{background:#b91c1c;color:#fff}

  /* Stacked action buttons */
  .action-col{display:flex;flex-direction:column;gap:4px;align-items:flex-end}
  .action-btn{background:transparent;color:var(--muted);padding:3px 8px;border-radius:5px;font-size:11px;border:1px solid var(--border);white-space:nowrap;text-align:left;min-width:62px}
  .action-btn:hover{color:var(--text);border-color:var(--muted)}
  .action-btn.danger:hover{color:var(--red);border-color:var(--red)}

  /* MODALS */
  .overlay{position:fixed;inset:0;background:rgba(6,8,18,.72);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:100;padding:1.5rem;animation:overlayIn .2s ease}
  @keyframes overlayIn{from{opacity:0}to{opacity:1}}
  @keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:2rem;width:100%;max-width:460px;max-height:92vh;overflow-y:auto;box-sizing:border-box;box-shadow:var(--shadow-lg);animation:modalIn .22s cubic-bezier(.34,1.26,.64,1)}
  .modal-title{font-size:18px;font-weight:700;margin-bottom:.25rem}
  .modal-sub{color:var(--muted);font-size:13px;margin-bottom:1.5rem}
  .modal-footer{display:flex;gap:.75rem;justify-content:flex-end;margin-top:1.5rem}
  .btn-ghost{padding:9px 20px;border-radius:10px;background:transparent;color:var(--muted);font-weight:500;border:1px solid var(--border)}
  .btn-ghost:hover{color:var(--text);background:var(--surface2)}
  .btn-danger{padding:9px 20px;border-radius:10px;background:#ef444418;color:var(--red);font-weight:600;border:1px solid #ef444430}
  .btn-danger:hover{background:#ef44442a}
  .qr-modal{max-width:380px;text-align:center}
  .qr-box{background:white;border-radius:18px;padding:1.5rem;display:inline-block;margin:1rem 0;box-shadow:0 4px 20px rgba(0,0,0,.35)}
  .qr-info{background:var(--surface2);border-radius:14px;padding:1rem;text-align:left;margin-top:.75rem}
  .qr-info-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
  .qr-info-row:last-child{margin-bottom:0}
  .qr-info-key{color:var(--muted)}
  .print-note{font-size:12px;color:var(--muted);margin-top:.75rem}
  .btn-print{padding:9px 18px;border-radius:8px;background:var(--surface2);color:var(--text);font-weight:600;border:1px solid var(--border)}
  .btn-print:hover{background:var(--border)}

  /* QR SCAN LANDING */
  .scan-landing{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:var(--bg)}
  .scan-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:2rem;width:100%;max-width:420px;box-shadow:var(--shadow-md)}
  .scan-brand{font-size:15px;font-weight:700;letter-spacing:-.5px;color:var(--muted);margin-bottom:1.5rem}
  .scan-brand span{color:var(--accent)}
  .folder-block{border-radius:18px;padding:1.25rem;margin-bottom:1.25rem;border:1px solid var(--border)}
  .folder-name{font-size:19px;font-weight:700;margin-bottom:.2rem}
  .folder-id{font-size:12px;color:var(--muted);margin-bottom:1rem}
  .status-row{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
  .status-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
  .status-dot.available{background:var(--green)}
  .status-dot.borrowed{background:var(--amber)}
  .status-dot.overdue{background:var(--red)}
  .status-label{font-size:17px;font-weight:700}
  .status-label.available{color:var(--green)}
  .status-label.borrowed{color:var(--amber)}
  .status-label.overdue{color:var(--red)}
  .info-row{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--border)44}
  .info-row:last-child{border-bottom:none}
  .info-key{color:var(--muted)}
  .scan-btns{display:flex;flex-direction:column;gap:.75rem;margin-top:1.25rem}
  .scan-btn{width:100%;padding:12px;border-radius:10px;font-weight:600;font-size:14px;transition:.15s;border:none}
  .scan-btn.borrow{background:var(--accent);color:#fff}
  .scan-btn.borrow:hover{background:#a8841e}
  .scan-btn.ret{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
  .scan-btn.ret:hover{border-color:var(--muted)}
  .scan-btn:disabled{opacity:.35;cursor:not-allowed}

  /* PASSWORD PANEL */
  .pw-panel{background:var(--surface2);border:1px solid var(--border);border-radius:18px;padding:1.25rem;margin-top:1rem}
  .pw-title{font-size:14px;font-weight:600;margin-bottom:.2rem}
  .pw-sub{font-size:12px;color:var(--muted);margin-bottom:1rem}
  .pw-actions{display:flex;gap:.5rem;margin-top:.75rem}
  .pw-actions .btn-ghost{flex:1;padding:9px 0;text-align:center}
  .pw-confirm{flex:1;padding:9px 0;border-radius:8px;font-weight:600;font-size:13px;background:var(--accent);color:#fff;border:none}
  .pw-confirm:hover{background:#a8841e}
  .pw-confirm.green{background:#16a34a}
  .pw-confirm.green:hover{background:#15803d}

  .scan-success{background:#22c55e14;border:1px solid #22c55e33;border-radius:18px;padding:1.25rem;text-align:center;margin-top:1rem}
  .scan-success-icon{font-size:32px;margin-bottom:.5rem}
  .scan-success-msg{color:#4ade80;font-weight:600;font-size:15px}
  .scan-success-sub{color:var(--muted);font-size:12px;margin-top:.25rem}

  /* Small status dots for table */
  .status-dot-sm{display:inline-block;width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .status-dot-sm.available{background:var(--green);box-shadow:0 0 5px var(--green)88}
  .status-dot-sm.borrowed{background:var(--amber);box-shadow:0 0 5px var(--amber)88}
  .status-dot-sm.overdue{background:var(--red);box-shadow:0 0 5px var(--red)88}

  /* Context menu */
  .ctx-menu{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:6px;z-index:200;box-shadow:0 16px 48px rgba(0,0,0,.6),0 2px 8px rgba(0,0,0,.3);min-width:168px;animation:modalIn .16s cubic-bezier(.34,1.26,.64,1)}
  .ctx-item{display:flex;align-items:center;gap:9px;padding:9px 14px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text);background:transparent;border:none;width:100%;text-align:left;transition:background .13s}
  .ctx-item:hover{background:var(--surface2)}
  .ctx-item.danger{color:var(--red)}
  .ctx-item.danger:hover{background:#ef444415}

  /* Detail modal enhancements */
  .detail-row{display:flex;justify-content:space-between;align-items:flex-start;font-size:13px;padding:9px 0;border-bottom:1px solid var(--border)33;gap:1rem}
  .detail-row:last-child{border-bottom:none}
  .detail-key{color:var(--muted);font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;min-width:90px;padding-top:1px}
  .detail-val{text-align:right;line-height:1.45;font-size:13.5px}

  /* Edit modal */
  .edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
  .empty-icon{font-size:40px;margin-bottom:.75rem}
  /* Hide all scrollbars globally */
  *{scrollbar-width:none;-ms-overflow-style:none}
  *::-webkit-scrollbar{display:none}

  /* Custom case-type picker */
  .ct-wrap{position:relative}
  .ct-trigger{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 12px;border-radius:10px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:13px;cursor:pointer;transition:border-color .15s;box-sizing:border-box}
  .ct-trigger:hover{border-color:var(--accent)}
  .ct-trigger.open{border-color:var(--accent);box-shadow:0 0 0 2px rgba(201,162,39,.18)}
  .ct-chevron{transition:transform .18s;color:var(--muted);flex-shrink:0}
  .ct-trigger.open .ct-chevron{transform:rotate(180deg)}
  .ct-menu{position:absolute;top:calc(100% + 5px);left:0;right:0;z-index:9999;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 12px 36px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.04);overflow:hidden;animation:ctFadeIn .15s ease}
  @keyframes ctFadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
  .ct-option{display:flex;align-items:center;gap:9px;padding:8px 12px;cursor:pointer;transition:background .12s;font-size:12.5px}
  .ct-option:hover{background:rgba(255,255,255,.06)}
  .ct-option.selected{background:rgba(201,162,39,.12)}
  .ct-option.selected .ct-opt-label{color:var(--accent2);font-weight:700}

  /* PDF PREVIEW MODAL */
  #pdf-overlay{position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.82);display:flex;flex-direction:column;align-items:center;justify-content:center;animation:ctFadeIn .15s ease;padding:16px}
  #pdf-overlay .pdf-modal{width:100%;max-width:860px;height:90vh;display:flex;flex-direction:column;background:var(--surface);border-radius:20px;overflow:hidden;box-shadow:0 40px 100px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.07)}
  #pdf-overlay .pdf-header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.1rem;background:var(--surface);border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;gap:10px}
  #pdf-overlay .pdf-title{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  #pdf-overlay .pdf-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
  #pdf-overlay iframe{flex:1;border:none;width:100%;background:#fff}
  #pdf-overlay .pdf-login-msg{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:2rem;text-align:center}
  /* SMART AUTOCOMPLETE */
  .ac-wrap{position:relative}
  .ac-wrap label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
  .ac-list{position:fixed;z-index:9999;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 12px 36px rgba(0,0,0,.55);overflow-y:auto;max-height:220px;animation:ctFadeIn .12s ease}
  .ac-item{padding:8px 13px;font-size:13px;cursor:pointer;color:var(--text);transition:background .1s;white-space:normal;word-break:break-word;line-height:1.4}
  .ac-item:hover,.ac-item.active{background:rgba(201,162,39,.15);color:var(--accent2)}
  .ac-item em{color:var(--accent2);font-style:normal;font-weight:700}

  /* ══════════════════════════════════════════════════════════════════
     MOBILE RESPONSIVE STYLES
     ══════════════════════════════════════════════════════════════════ */
  .detail-drag-handle { display: none; }
  @media (max-width: 768px) {
    /* Force single-column on modal form grids */
    div[style*="grid-template-columns:1fr 1fr 1fr"] { grid-template-columns: 1fr !important; }
    div[style*="grid-template-columns:1fr 1fr"] { grid-template-columns: 1fr !important; }


    /* ── App Layout: stack vertically ── */
    .app { flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; }

    /* ── Hide sidebar entirely on mobile — replaced by bottom nav ── */
    .sidebar { display: none !important; }

    /* ── Main content fills screen ── */
    .main {
      flex: 1;
      padding: .75rem .7rem;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: calc(76px + env(safe-area-inset-bottom, 0px));
      min-width: 0;
    }

    /* ── Bottom Navigation Bar ── */
    .mobile-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: calc(60px + env(safe-area-inset-bottom, 0px));
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: stretch;
      z-index: 500;
      box-shadow: 0 -8px 24px rgba(0,0,0,.4);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .mobile-nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      color: var(--muted);
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: .4px;
      text-transform: uppercase;
      cursor: pointer;
      background: transparent;
      border: none;
      transition: color .18s;
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }
    .mobile-nav-item.active { color: var(--accent2); }
    .mobile-nav-item.active::before {
      content: '';
      position: absolute;
      top: 0; left: 28%; right: 28%;
      height: 2.5px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 0 0 4px 4px;
    }
    .mobile-nav-item svg { width: 19px; height: 19px; }

    /* ── Page titles smaller ── */
    .page-title { font-size: 17px; margin-bottom: .1rem; }
    .page-sub { font-size: 11.5px; margin-bottom: .85rem; }

    /* ── Stats: 2 columns on mobile ── */
    .stats {
      grid-template-columns: repeat(3, 1fr);
      gap: .45rem;
      margin-bottom: .8rem;
    }
    .stat { padding: .6rem .75rem; border-radius: 13px; }
    .stat-val { font-size: 22px; letter-spacing: -1px; }
    .stat-label { font-size: 10px; margin-top: 1px; }

    /* ── Table: replace with card list on mobile ── */
    .table-wrap { border-radius: 18px; overflow: hidden; }
    .table-header {
      padding: .7rem .9rem;
      flex-wrap: nowrap;
      gap: .5rem;
    }
    .table-title { font-size: 13.5px; font-weight: 700; }
    .btn-sm { padding: 7px 13px; font-size: 12px; }

    /* Hide the actual table — use card layout instead */
    table { display: none; }

    /* ── Mobile folder cards ── */
    .mobile-cards { display: flex; flex-direction: column; gap: 0; background: var(--surface); }
    .mobile-card {
      padding: .75rem .9rem;
      border-bottom: 1px solid var(--border)33;
      cursor: pointer;
      transition: background .12s;
      display: flex;
      align-items: center;
      gap: .7rem;
    }
    .mobile-card:last-child { border-bottom: none; }
    .mobile-card:active { background: var(--surface2); }
    .mobile-card-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .mobile-card-dot.available { background: var(--green); box-shadow: 0 0 6px var(--green)88; }
    .mobile-card-dot.borrowed  { background: var(--amber); box-shadow: 0 0 6px var(--amber)88; }
    .mobile-card-dot.overdue   { background: var(--red);   box-shadow: 0 0 6px var(--red)88;   }
    .mobile-card-body { flex: 1; min-width: 0; }
    .mobile-card-id {
      font-size: 9.5px; font-weight: 700;
      color: var(--accent2);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 1px 7px;
      display: inline-block;
      margin-bottom: 2px;
      letter-spacing: .4px;
    }
    .mobile-card-name {
      font-size: 13px; font-weight: 600;
      line-height: 1.35;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .mobile-card-meta {
      font-size: 10.5px; color: var(--muted);
      margin-top: 1px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .mobile-card-right {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }
    .mobile-card-badge {
      font-size: 9.5px; font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: .3px;
      white-space: nowrap;
    }
    .mobile-card-badge.available { background: #16a34a; color: #fff; }
    .mobile-card-badge.borrowed  { background: #b45309; color: #fff; }
    .mobile-card-badge.overdue   { background: #b91c1c; color: #fff; }
    .mobile-card-borrower { font-size: 10.5px; color: var(--muted); max-width: 90px; text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mobile-card-chevron { color: var(--border); margin-top: 2px; }

    /* ── Filter bar on mobile ── */
    .mobile-filters {
      display: flex;
      align-items: center;
      gap: .35rem;
      padding: .5rem .9rem;
      padding-right: 1.1rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      /* Fade right edge to hint scroll */
      -webkit-mask-image: linear-gradient(to right, black 85%, transparent 100%);
      mask-image: linear-gradient(to right, black 85%, transparent 100%);
    }
    .mobile-filters::-webkit-scrollbar { display: none; }

    /* ── Search panel columns: 2 col on mobile ── */
    .search-grid-mobile { grid-template-columns: repeat(2,1fr) !important; }

    /* ── Modals: full screen bottom sheet on mobile ── */
    .overlay { padding: 0; align-items: flex-end; }
    .modal {
      border-radius: 22px 22px 0 0 !important;
      max-width: 100% !important;
      max-height: 90vh;
      max-height: 90dvh;
      min-height: 40vh;
      padding: 1.25rem 1.1rem calc(1.5rem + env(safe-area-inset-bottom, 0px));
      width: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    /* drag handle on all mobile modals */
    .modal::before {
      content: '';
      display: block;
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 1.1rem;
    }
    /* QR modal stays centered as a card */
    .qr-modal {
      border-radius: 22px !important;
      max-width: 340px !important;
      margin: auto;
      min-height: unset;
    }
    .qr-modal::before { display: none; }

    /* ── Detail modal: bottom sheet on mobile ── */
    .overlay-detail {
      padding: 0 !important;
      align-items: flex-end !important;
    }
    .detail-modal {
      border-radius: 24px 24px 0 0 !important;
      max-width: 100% !important;
      width: 100% !important;
      height: 92vh !important;
      height: 92dvh !important;
      max-height: 92vh !important;
      max-height: 92dvh !important;
      min-height: unset !important;
      overflow: hidden !important;
      padding: 0 !important;
      display: flex !important;
      flex-direction: column !important;
      box-shadow: 0 -8px 40px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.06) !important;
    }
    .detail-modal::before { display: none !important; }
    .detail-drag-handle { display: block; width: 36px; height: 4px; background: rgba(255,255,255,.2); border-radius: 2px; margin: 10px auto 0; flex-shrink: 0; }

    /* Add folder modal: single column grid */
    .edit-grid { grid-template-columns: 1fr !important; }

    /* ── Scan landing: full screen, no side padding ── */
    .scan-landing { padding: 1rem .75rem; align-items: flex-start; }
    .scan-card {
      border-radius: 20px;
      padding: 1.25rem 1rem;
      max-width: 100%;
    }
    .folder-name { font-size: 16px; }

    /* ── Auth box: full width ── */
    .auth-wrap { padding: 1rem .75rem; align-items: flex-start; padding-top: 3rem; }
    .auth-box { padding: 1.75rem 1.25rem; border-radius: 20px; }

    /* ── Lookup page ── */
    .main > div[style*="max-width:480px"] { max-width: 100% !important; }

    /* ── Add modal: bottom sheet with drag ── */
    .overlay-add {
      padding: 0 !important;
      align-items: flex-end !important;
    }
    .add-modal {
      border-radius: 22px 22px 0 0 !important;
      max-width: 100% !important;
      max-height: 90vh;
      max-height: 90dvh;
      width: 100% !important;
      padding: 0 !important;
      overflow: hidden !important;
      display: flex;
      flex-direction: column;
    }
    /* drag handle bar inside add modal */
    .add-modal::before { display: none !important; }
    .add-drag-handle {
      display: block;
      width: 36px; height: 4px;
      background: rgba(255,255,255,.2);
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0;
    }
    /* sticky header with bottom fade */
    .add-modal-header {
      position: relative;
      flex-shrink: 0;
      padding: 0.75rem 1.1rem 0;
      z-index: 2;
    }
    .add-modal-header::after {
      content: '';
      position: absolute;
      bottom: -28px; left: 0; right: 0;
      height: 28px;
      background: linear-gradient(to bottom, var(--surface) 0%, transparent 100%);
      pointer-events: none;
      z-index: 3;
    }
    /* scrollable body */
    .add-modal-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 1.25rem 1.1rem calc(1.5rem + env(safe-area-inset-bottom, 0px));
    }

    /* ── Context menu: full width bottom sheet on mobile ── */

};

const db = firebase.firestore();

const functionsInst = firebase.functions();
const filesCol = db.collection('files');

const rejectedUsersCol = db.collection('rejectedUsers');

function syncFileToDb(f){
  if(!f || !f.id) return;
  filesCol.doc(String(f.id)).set(JSON.parse(JSON.stringify(f)), {merge:true}).catch(e=>console.error('syncFileToDb failed:', e));
}
function addFileToDb(f){
  filesCol.doc(String(f.id)).set(JSON.parse(JSON.stringify(f))).catch(e=>console.error('addFileToDb failed:', e));
}
function deleteFileFromDb(id){
  filesCol.doc(String(id)).delete().catch(e=>console.error('deleteFileFromDb failed:', e));
}
function syncUserToDb(u){
  if(!u || u.id==null) return;
  usersCol.doc(String(u.id)).set(JSON.parse(JSON.stringify(u)), {merge:true}).catch(e=>console.error('syncUserToDb failed:', e));
}

let _ftFirstUsersSnapshot = true;
let _ftFirstFilesSnapshot = true;
let _ftFirstRejectedSnapshot = true;
let _ftDataSyncStarted = false;
let _ftUnsubUsers = null;
let _ftUnsubFiles = null;
let _ftUnsubRejectedUsers = null;

function startDataSync(){
  if(_ftDataSyncStarted) return;
  _ftDataSyncStarted = true;

  _ftUnsubUsers = usersCol.onSnapshot(snap=>{
    const liveUsers = snap.docs.map(d=>d.data());
    if(liveUsers.length){
      users.length = 0;
      liveUsers.forEach(u=>users.push(u));
      if(currentUser){
        const fresh = users.find(u=>u.id===currentUser.id);
        if(fresh) currentUser = fresh;
      }
    }
    if(!_ftFirstUsersSnapshot && typeof render==='function') render();
    _ftFirstUsersSnapshot = false;
  }, e=>console.error('users onSnapshot error:', e));

  if(currentUser && currentUser.role==='admin'){
    _ftUnsubRejectedUsers = rejectedUsersCol.onSnapshot(snap=>{
      rejectedUsers.length = 0;
      snap.docs.forEach(d=>rejectedUsers.push(d.data()));
      if(!_ftFirstRejectedSnapshot && typeof render==='function') render();
      _ftFirstRejectedSnapshot = false;
    }, e=>console.error('rejectedUsers onSnapshot error:', e));
  }

  _ftUnsubFiles = filesCol.onSnapshot(snap=>{
    const liveFiles = snap.docs.map(d=>d.data());
    if(liveFiles.length){
      files.length = 0;
      liveFiles.forEach(f=>files.push(f));
      if(selectedFile){
        const fresh = files.find(f=>f.id===selectedFile.id);
        if(fresh) selectedFile = fresh;
      }
    }
    if(!_ftFirstFilesSnapshot && typeof render==='function') render();
    _ftFirstFilesSnapshot = false;
  }, e=>console.error('files onSnapshot error:', e));
}

function stopDataSync(){
  if(_ftUnsubUsers){_ftUnsubUsers();_ftUnsubUsers=null;}
  if(_ftUnsubFiles){_ftUnsubFiles();_ftUnsubFiles=null;}
  if(_ftUnsubRejectedUsers){_ftUnsubRejectedUsers();_ftUnsubRejectedUsers=null;}
  _ftDataSyncStarted=false;
  _ftFirstUsersSnapshot=true;
  _ftFirstFilesSnapshot=true;
  _ftFirstRejectedSnapshot=true;
}

// One-time, ADMIN-ONLY seeding of the 'files' collection (mirrors desktop).
function seedFilesIfEmptyAsAdmin(){
  if(!currentUser || currentUser.role!=='admin') return;
  filesCol.limit(1).get().then(snap=>{
    if(snap.empty){
      const batch = db.batch();
      files.forEach(f=>batch.set(filesCol.doc(String(f.id)), JSON.parse(JSON.stringify(f))));
      return batch.commit();
    }
  }).catch(e=>console.error('File seeding failed:', e));
}

// Set true while doRegister()'s ghost-account fallback is actively
// signing in + resolving a profile, so onAuthStateChanged doesn't race it.
let _ftRegisterInFlight = false;

// Restore session on page refresh if Firebase Auth already has a signed-in user.
auth.onAuthStateChanged(fbUser=>{
  if(fbUser){
    if(_ftRegisterInFlight) return;
    if(!currentUser){
      usersCol.doc(fbUser.uid).get().then(doc=>{
        if(doc.exists){
          currentUser=doc.data();
          startDataSync();
          seedFilesIfEmptyAsAdmin();
          render();
        }
      }).catch(e=>console.error('Session restore failed:', e));
    } else {
      startDataSync();
      seedFilesIfEmptyAsAdmin();
    }
  } else {
    stopDataSync();
  }
});

// ── Password reset link state (same as desktop) ──────────────────────────
let resetOobCode = null;
let resetState = 'idle'; // 'idle' | 'verifying' | 'ready' | 'invalid' | 'success'
let resetEmail = '';
function checkForPasswordResetLink(){
  const params=new URLSearchParams(window.location.search);
  if(params.get('mode')!=='resetPassword') return;
  const code=params.get('oobCode');
  if(!code) return;
  resetOobCode=code;
  resetState='verifying';
  auth.verifyPasswordResetCode(code).then(email=>{
    resetEmail=email;
    resetState='ready';
    render();
  }).catch(e=>{
    console.error('verifyPasswordResetCode failed:', e);
    resetState='invalid';
    render();
  });
}

// SECTION 7 — ROOT RENDER ENGINE
// Single re-paint entry point called after every state change.
// Routes to: scan page → auth screen → main app.
// Preserves focused element + cursor position across repaints.
// ============================================================
// ── Root render ────────────────────────────────────────────────────────
function render(){
  syncOverdue();
  const root=document.getElementById('root');
  const activeEl=document.activeElement;
  const focusId=activeEl&&activeEl.id||null;
  const focusSel=(activeEl&&activeEl.selectionStart!=null)?activeEl.selectionStart:null;
  const focusSel_end=(activeEl&&activeEl.selectionEnd!=null)?activeEl.selectionEnd:null;
  if(resetOobCode){root.innerHTML=renderResetPasswordScreen();attachResetPasswordScreen();return}
  if(scanFileId!==null){root.innerHTML=renderScanPage();attachScan();return}
  if(!currentUser){root.innerHTML=renderAuth();attachAuth();return}
  if(currentUser.role==='pending'){root.innerHTML=renderPendingScreen();return}
  root.innerHTML=renderApp();
  attachApp();
  const _ti=document.getElementById('theme-icon');
  if(_ti&&document.documentElement.classList.contains('light')){
    _ti.innerHTML='<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  }
  if(focusId){
    const el=document.getElementById(focusId);
    if(el){el.focus();if(focusSel!=null&&el.setSelectionRange)el.setSelectionRange(focusSel,focusSel_end!=null?focusSel_end:focusSel);}
  }
}

function doLogin(){
  const e=document.getElementById('l-email').value.trim();
  const p=document.getElementById('l-pass').value;
  const errEl=document.getElementById('l-err');
  errEl.textContent='';
  if(!e||!e.includes('@')){errEl.textContent='Please enter a valid email.';return}

  const btn=document.querySelector('.btn-primary');
  if(btn){btn.disabled=true;btn.innerHTML=`<span style="display:inline-flex;align-items:center;gap:8px"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="animation:ft-spin .7s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>Signing in…</span>`;}

  auth.signInWithEmailAndPassword(e,p).then(cred=>{
    return usersCol.doc(cred.user.uid).get();

function doRegister(){
  const n=document.getElementById('r-name').value.trim();
  const e=document.getElementById('r-email').value.trim();
  const p=document.getElementById('r-pass').value;
  const err=document.getElementById('r-err');
  err.textContent='';
  if(!n||!e||!p){err.textContent='All fields required.';return}
  if(!e.includes('@')||!e.includes('.')){err.textContent='Please enter a valid email.';return}
  if(p.length<6){err.textContent='Password min 6 chars.';return}

  const btn=document.querySelector('.btn-primary');
  const resetBtn=()=>{ if(btn){btn.disabled=false;btn.textContent='Create Account';} };
  if(btn){btn.disabled=true;btn.innerHTML=`<span style="display:inline-flex;align-items:center;gap:8px"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="animation:ft-spin .7s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>Creating account…</span>`;}

  _ftRegisterInFlight=true;
  auth.createUserWithEmailAndPassword(e,p).then(cred=>{
    const uid=cred.user.uid;
    const profile={id:uid,name:n,email:e,role:'pending',title:'Pending',avatar:null};
    return usersCol.doc(uid).set(profile).then(()=>profile);
  }).then(profile=>{
    _ftRegisterInFlight=false;
    currentUser=profile;
    startDataSync();
    showLoginLoader();
    render();
    setTimeout(hideLoginLoader, 600);
  }).catch(error=>{
    if(error.code==='auth/email-already-in-use'){
      // Could be a ghost account left behind by a past rejection/deletion.
      // Try signing in with what they just typed to check.
      auth.signInWithEmailAndPassword(e,p).then(cred=>{
        const uid=cred.user.uid;
        return usersCol.doc(uid).get({source:'server'}).then(doc=>{
          if(doc.exists){
            _ftRegisterInFlight=false;
            resetBtn();
            auth.signOut();
            err.textContent='Email already registered.';
            return;
          }
          const profile={id:uid,name:n,email:e,role:'pending',title:'Pending',avatar:null};
          const batch=db.batch();
          batch.set(usersCol.doc(uid), profile);
          batch.delete(rejectedUsersCol.doc(uid));
          return batch.commit().then(()=>{
            _ftRegisterInFlight=false;
            currentUser=profile;
            const ridx=rejectedUsers.findIndex(r=>r.id===uid);
            if(ridx>-1) rejectedUsers.splice(ridx,1);
            startDataSync();
            showLoginLoader();
            render();
            setTimeout(hideLoginLoader, 600);
          });
        });
      }).catch(()=>{
        _ftRegisterInFlight=false;
        resetBtn();
        err.textContent='Email already registered.';
      });
    }
    else if(error.code==='auth/weak-password'){ _ftRegisterInFlight=false; resetBtn(); err.textContent='Password min 6 chars.'; }
    else { _ftRegisterInFlight=false; resetBtn(); err.textContent=error.message; }
  });
}
function attachAuth(){
  const lEmail=document.getElementById('l-email');
  const lPass=document.getElementById('l-pass');
  if(lEmail) lEmail.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();lPass&&lPass.focus();}});
  if(lPass) lPass.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
  const rName=document.getElementById('r-name');
  const rEmail=document.getElementById('r-email');
  const rPass=document.getElementById('r-pass');
  if(rName) rName.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();rEmail&&rEmail.focus();}});
  if(rEmail) rEmail.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();rPass&&rPass.focus();}});
  if(rPass) rPass.addEventListener('keydown',e=>{if(e.key==='Enter')doRegister()});
}

function attachResetPasswordScreen(){
  if(resetState!=='ready') return;
  const confEl=document.getElementById('rp-conf');
  if(confEl) confEl.onkeydown=e=>{ if(e.key==='Enter') submitNewPassword(); };
}
function submitNewPassword(){
  const pEl=document.getElementById('rp-pass');
  const cEl=document.getElementById('rp-conf');
  const err=document.getElementById('rp-err');
  if(!pEl||!cEl||!err) return;
  const p=pEl.value, c=cEl.value;
  err.textContent='';
  if(!p||!c){err.textContent='Please fill in both fields.';return}
  if(p.length<6){err.textContent='Password min 6 chars.';return}
  if(p!==c){err.textContent='Passwords do not match.';return}
  auth.confirmPasswordReset(resetOobCode, p).then(()=>{
    resetState='success';
    render();
  }).catch(e=>{
    console.error('confirmPasswordReset failed:', e);
    if(e.code==='auth/expired-action-code'||e.code==='auth/invalid-action-code'){
      resetState='invalid';
      render();
    } else {
      err.textContent=e.message||'Could not update password.';
    }
  });
}
function exitResetScreen(){
  resetOobCode=null;
  resetState='idle';
  resetEmail='';
  if(window.history && window.history.replaceState){
    window.history.replaceState(null, '', window.location.pathname);
  }
  render();
}

function setScanAction(a){
  _confirmingScan=false;
  scanAction=a;scanMsg=null;
  render();
}

let _confirmingScan = false;
const _sessionBorrows = new Set(); // fids borrowed in this login session — skip pw on return
function confirmScan(){
  if(_confirmingScan) return; _confirmingScan=true;
  const pass=document.getElementById('pw-pass').value||'';

  // Skip password verification if user is returning a folder they borrowed this session
  const skipPw = scanAction === 'return' && _sessionBorrows.has(scanFileId);
  if(skipPw){ runScanAction(); return; }

  const cred=firebase.auth.EmailAuthProvider.credential(currentUser.email, pass);
  auth.currentUser.reauthenticateWithCredential(cred).then(()=>{
    runScanAction();
  }).catch(()=>{
    scanMsg={type:'err',text:'Incorrect password. Try again.'};
    _confirmingScan=false;
    setScanAction(scanAction);
  });
}
function runScanAction(){
  const u=currentUser;

  const f=files.find(f=>f.id===scanFileId);

  if(scanAction==='borrow'){
    if(f.status!=='available'){scanMsg={type:'err',text:'This folder is no longer available.'};_confirmingScan=false;setScanAction(scanAction);return}
    f.status='borrowed';f.borrower=u.name;f.borrowerEmail=u.email;f.borrowDate=todayStr();f.dueDate=null;
    _sessionBorrows.add(scanFileId);
    if(!f.borrowHistory)f.borrowHistory=[];
    // Guard: only push if there is no open (unreturned) entry already
    const _lastH=f.borrowHistory[f.borrowHistory.length-1];
    if(!_lastH||_lastH.returnedOn!==null){
      const _bfe=staffBorrowForEmail;staffBorrowForEmail='';
      const borrowForUser=_bfe?users.find(u2=>u2.email===_bfe):null;
      f.borrowHistory.push({borrower:u.name,borrowerEmail:u.email,borrowedOn:todayStr(),returnedOn:null,borrowFor:borrowForUser?borrowForUser.name:null,borrowForEmail:_bfe||null});
    }
    syncFileToDb(f);
  } else {
    if(f.status==='available'){scanMsg={type:'err',text:'This folder is already available.'};_confirmingScan=false;setScanAction(scanAction);return}
    const _lhR=f.borrowHistory&&f.borrowHistory.length?f.borrowHistory[f.borrowHistory.length-1]:null;
    const _isBorrowForLawyer=_lhR&&_lhR.borrowForEmail&&u.email===_lhR.borrowForEmail;
    if(u.role!=='admin'&&f.borrowerEmail&&u.email!==f.borrowerEmail&&!_isBorrowForLawyer){
      scanMsg={type:'err',text:'Only '+f.borrower+(_lhR&&_lhR.borrowFor?' (on behalf of '+lawyerAbbrev(_lhR.borrowFor)+')':'')+', '+(_lhR&&_lhR.borrowFor?lawyerAbbrev(_lhR.borrowFor)+',':'')+' or an admin can return this folder.'};
      _confirmingScan=false;setScanAction(scanAction);return;
    }
    if(!f.borrowHistory)f.borrowHistory=[];
    const lastEntry=f.borrowHistory[f.borrowHistory.length-1];
    if(lastEntry&&lastEntry.returnedOn===null){
      lastEntry.returnedOn=todayStr();
    } else {
      f.borrowHistory.push({borrower:f.borrower,borrowerEmail:f.borrowerEmail,borrowedOn:f.borrowDate||todayStr(),returnedOn:todayStr()});
    }
    f.status='available';f.borrower=null;f.borrowerEmail=null;f.borrowDate=null;f.dueDate=null;
    _sessionBorrows.delete(scanFileId);
    syncFileToDb(f);
  }

  scanDoneAction=scanAction;
  const _toastMsg = scanAction==='borrow' ? 'Folder borrowed' : 'Folder returned';
  scanDone=true;
  scanAction=null;
  _confirmingScan=false;
  render();
  setTimeout(()=>showToast(_toastMsg), 120);
}

function attachScan(){
  const pw=document.getElementById('pw-pass');
  if(pw)pw.addEventListener('keydown',e=>{if(e.key==='Enter')confirmScan()});
}

let sidebarCollapsed = false;
function toggleSidebar(){
  sidebarCollapsed=!sidebarCollapsed;
  const sb=document.querySelector('.sidebar');
  if(sb) sb.classList.toggle('collapsed',sidebarCollapsed);
}
function expandSidebar(e){
  // Only expand when clicking the sidebar background while collapsed — not on interactive children
  if(!sidebarCollapsed) return;
  if(e.target.closest('.nav-item,.sidebar-toggle,.logout-btn,.user-pill')) return;
  sidebarCollapsed=false;
  const sb=document.querySelector('.sidebar');
  if(sb) sb.classList.remove('collapsed');
}
document.addEventListener('click',function(e){
  if(sidebarCollapsed) return;
  if(e.target.closest('.sidebar')) return;
  // Keep open if click is on anything interactive or inside a modal/overlay
  if(e.target.closest('button,a,input,select,textarea,[onclick],.overlay,.modal,.ctx-menu')) return;
  sidebarCollapsed=true;
  const sb=document.querySelector('.sidebar');
  if(sb) sb.classList.add('collapsed');
},{capture:false});

// ── Camera QR Scanner ──────────────────────────────────────────────────
let _camStream = null;
let _camRAF = null;
let _jsQRLoaded = false;

function extractFolderIdFromQR(text){
  // Match yourdomain.com/scan?id=XXX or just the raw ID
  const m = text.match(/[?&]id=([^&\s]+)/i);
  if(m) return m[1].trim().toUpperCase();
  // If it's a plain ID (no URL), use it directly
  const plain = text.trim().toUpperCase();
  if(files.find(f=>f.id===plain)) return plain;
  return null;
}

function toggleCameraScanner(){
  const wrap = document.getElementById('qr-camera-wrap');
  if(!wrap) return;
  if(wrap.style.display === 'none'){
    startCameraScanner();
  } else {
    stopCameraScanner();
  }
}

function setCamBtn(label, icon){
  const btn = document.getElementById('qr-scan-btn');
  if(!btn) return;
  const icons = {
    open: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7V2h-5M23 17v5h-5M1 7V2h5M1 17v5h5"/><rect x="7" y="7" width="10" height="10" rx="1"/></svg>`,
    stop: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="4" y="4" width="16" height="16" rx="2" fill="currentColor" opacity=".25"/><rect x="4" y="4" width="16" height="16" rx="2"/></svg>`
  };
  btn.innerHTML = (icons[icon]||'') + ' ' + label;
  btn.style.background = icon === 'stop' ? '#ef4444' : 'var(--accent)';
}

function showCamErr(msg){
  const el = document.getElementById('qr-scan-err');
  if(!el) return;
  el.innerHTML = `<div style="padding:.75rem 1.1rem;font-size:12.5px;color:var(--red);background:rgba(239,68,68,.08);border-top:1px solid rgba(239,68,68,.2)">${msg}</div>`;
  el.style.maxHeight = '80px';
}
function hideCamErr(){
  const el = document.getElementById('qr-scan-err');
  if(el){ el.innerHTML=''; el.style.maxHeight='0'; }
}

async function startCameraScanner(){
  hideCamErr();
  const wrap = document.getElementById('qr-camera-wrap');
  const video = document.getElementById('qr-video');
  const status = document.getElementById('qr-status');
  if(!wrap||!video) return;

  // Load jsQR if not already loaded
  if(!window.jsQR){
    if(!_jsQRLoaded){
      _jsQRLoaded = true;
      await new Promise((res,rej)=>{
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js';
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      }).catch(()=>{});
    }
  }

  // Try camera
  try {
    _camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width:{ideal:1280}, height:{ideal:1280} }
    });
    video.srcObject = _camStream;
    await video.play();
    wrap.style.display = 'block';
    setCamBtn('Stop Camera', 'stop');
    if(status) status.textContent = 'Scanning…';
    _scanFrame();
  } catch(err){
    const msg = err.name==='NotAllowedError'
      ? 'Camera permission denied. Please allow camera access and try again.'
      : err.name==='NotFoundError'
      ? 'No camera found on this device.'
      : 'Could not access camera: ' + err.message;
    showCamErr(msg);
    stopCameraScanner();
  }
}

function stopCameraScanner(){
  if(_camRAF){ cancelAnimationFrame(_camRAF); _camRAF=null; }
  if(_camStream){ _camStream.getTracks().forEach(t=>t.stop()); _camStream=null; }
  const wrap = document.getElementById('qr-camera-wrap');
  const video = document.getElementById('qr-video');
  if(video){ video.srcObject=null; }
  if(wrap){ wrap.style.display='none'; }
  setCamBtn('Open Camera', 'open');
}

function _scanFrame(){
  const video = document.getElementById('qr-video');
  const canvas = document.getElementById('qr-canvas');
  const status = document.getElementById('qr-status');
  if(!video||!canvas||!_camStream) return;

  // Wait until video has real dimensions
  if(video.readyState < 2){
    _camRAF = requestAnimationFrame(_scanFrame);
    return;
  }

  const w = video.videoWidth, h = video.videoHeight;
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, w, h);

  let found = false;

  // Try BarcodeDetector first (native, fast)
  if(window.BarcodeDetector){
    window.BarcodeDetector.getSupportedFormats().then(fmts=>{
      if(fmts.includes('qr_code')){
        const bd = new BarcodeDetector({formats:['qr_code']});
        const imgData = ctx.getImageData(0,0,w,h);
        bd.detect(canvas).then(codes=>{
          if(codes.length>0){
            _onQRResult(codes[0].rawValue);
          } else {
            if(!found) _camRAF = requestAnimationFrame(_scanFrame);
          }
        }).catch(()=>{
          _camRAF = requestAnimationFrame(_scanFrame);
        });
      }
    });
    return;
  }

  // Fallback: jsQR
  if(window.jsQR){
    const imgData = ctx.getImageData(0,0,w,h);
    const code = jsQR(imgData.data, w, h, {inversionAttempts:'dontInvert'});
    if(code){
      _onQRResult(code.data);
      return;
    }
  }
  _camRAF = requestAnimationFrame(_scanFrame);
}

function _onQRResult(text){
  stopCameraScanner();
  const fid = extractFolderIdFromQR(text);
  if(!fid){
    showCamErr(`QR scanned but no matching folder found. Raw: "${text.slice(0,60)}"`);
    return;
  }
  const f = files.find(f=>f.id===fid);
  if(!f){
    showCamErr(`Case Folder No. "${fid}" not found in the system.`);
    return;
  }
  hideCamErr();
  openScan(fid);
}

// ── Detail swipe (mobile) ──────────────────────────────────────────────
let _swipePanel = 0;
function _initDetailSwipe(){
  const track = document.getElementById('detail-swipe-track');
  if(!track) return;
  let startX=0, startY=0, dragging=false, moved=false;
  function goTo(idx){
    _swipePanel = idx;
    track.style.transition = 'transform .3s cubic-bezier(.4,0,.2,1)';
    track.style.transform = idx===0 ? 'translateX(0)' : 'translateX(-50%)';
    const d0=document.getElementById('dot-0'), d1=document.getElementById('dot-1');
    if(d0) d0.style.background = idx===0 ? 'var(--accent)' : 'rgba(255,255,255,.2)';
    if(d1) d1.style.background = idx===1 ? 'var(--accent)' : 'rgba(255,255,255,.2)';
  }
  track.addEventListener('touchstart', e=>{
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    dragging = true; moved = false;
    track.style.transition = 'none';
  },{passive:true});
  track.addEventListener('touchmove', e=>{
    if(!dragging) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if(!moved && Math.abs(dy) > Math.abs(dx)) { dragging=false; return; }
    moved = true;
    const base = _swipePanel===0 ? 0 : -50;
    const pct = (dx / track.parentElement.offsetWidth) * 100;
    const clamped = Math.max(-50, Math.min(0, base + pct));
    track.style.transform = `translateX(${clamped}%)`;
  },{passive:true});
  track.addEventListener('touchend', e=>{
    if(!dragging) return;
    dragging = false;
    const dx = e.changedTouches[0].clientX - startX;
    if(dx < -40 && _swipePanel===0) goTo(1);
    else if(dx > 40 && _swipePanel===1) goTo(0);
    else goTo(_swipePanel);
  },{passive:true});
  goTo(0);
}

// ============================================================
// SECTION 20 — SMART AUTOCOMPLETE FOR FORM INPUTS
// Live dropdown suggestions from existing files[] data for:
// Folder ID prefixes, locations, case no. prefixes, courts,
// and case natures. Arrow keys, Enter/Tab, Escape supported.
// renderSmartInput() wires the four AC event hooks.
// ============================================================
// ── Smart Autocomplete ─────────────────────────────────────────────
function getFolderIdSuggestions(typed) {
  if (!typed) return [];
  const t = typed.toLowerCase();
  // Collect only real prefixes (everything except the final unique number segment)
  const prefixes = new Set();
  files.forEach(f => {
    const segs = f.id.split('-');
    let built = '';
    for (let i = 0; i < segs.length - 1; i++) {
      built = i === 0 ? segs[i] : built + '-' + segs[i];
      prefixes.add(built);
    }
  });
  return [...prefixes]
    .filter(s => s.toLowerCase().startsWith(t) && s.toLowerCase() !== t)
    .sort()
    .slice(0, 8);
}

function getLocationSuggestions(typed) {
  if (!typed) return [];
  const t = typed.toLowerCase();
  const all = [...new Set(files.map(f => f.location).filter(Boolean))];
  // Only return exact presaved locations that start with what was typed
  return all
    .filter(s => s.toLowerCase().startsWith(t) && s.toLowerCase() !== t)
    .sort()
    .slice(0, 8);
}

function getCaseNoSuggestions(typed) {
  if (!typed) return [];
  const t = typed.toLowerCase();
  // Only the prefix part (strip trailing unique number) of each presaved caseNo
  const prefixes = new Set();
  files.forEach(f => {
    if (!f.caseNo) return;
    const match = f.caseNo.match(/^(.*?(?:No\.|#)\s*)\d+/i);
    if (match) prefixes.add(match[1].trimEnd());
  });
  return [...prefixes]
    .filter(s => s.toLowerCase().startsWith(t) && s.toLowerCase() !== t)
    .sort()
    .slice(0, 8);
}

function getCourtSuggestions(typed) {
  if (!typed) return [];
  const t = typed.toLowerCase();
  const all = [...new Set(files.map(f => f.court).filter(Boolean))];
  // Return exact presaved court strings that contain the typed text anywhere
  return all
    .filter(s => s.toLowerCase().startsWith(t) && s.toLowerCase() !== t)
    .sort((a, b) => a.localeCompare(b))
    .slice(0, 8);
}

function getCaseNatureSuggestions(typed) {
  if (!typed) return [];
  const t = typed.toLowerCase();
  const all = [...new Set(files.map(f => f.caseNature).filter(Boolean))];
  // Return exact presaved nature strings that contain the typed text anywhere
  return all
    .filter(s => s.toLowerCase().startsWith(t) && s.toLowerCase() !== t)
    .sort((a, b) => a.localeCompare(b))
    .slice(0, 8);
}

// Render just the dropdown list — never touches the input itself
function acRenderDropdown(id, type) {
  const el = document.getElementById(id);
  if (!el) return;
  const val = el.value;
  const suggestions = type === 'folderid' ? getFolderIdSuggestions(val)
    : type === 'location' ? getLocationSuggestions(val)
    : type === 'caseno' ? getCaseNoSuggestions(val)
    : type === 'court' ? getCourtSuggestions(val)
    : type === 'nature' ? getCaseNatureSuggestions(val)
    : [];
  
  // Remove existing dropdown
  const old = document.getElementById('aclist-' + id);
  if (old) old.remove();
  
  if (!suggestions.length) return;
  
  const list = document.createElement('div');
  list.className = 'ac-list';
  list.id = 'aclist-' + id;

  // Position using fixed coords so it floats above the form
  const rect = el.getBoundingClientRect();
  const viewportWidth = window.innerWidth;
  const PADDING = 12; // min gap from screen edge
  // Start at input left, expand right; clamp so it doesn't overflow
  const naturalLeft = rect.left;
  // We'll set width after measuring — start with min-width = input width
  list.style.top = (rect.bottom + 4) + 'px';
  list.style.left = naturalLeft + 'px';
  list.style.minWidth = rect.width + 'px';
  list.style.maxWidth = (viewportWidth - naturalLeft - PADDING) + 'px';

  let activeIdx = parseInt(el.dataset.acIdx || '0');
  
  suggestions.forEach((s, i) => {
    const item = document.createElement('div');
    item.className = 'ac-item' + (i === activeIdx ? ' active' : '');
    // Bold the typed portion
    const lo = val.toLowerCase();
    if (s.toLowerCase().startsWith(lo)) {
      item.innerHTML = '<em>' + s.slice(0, val.length) + '</em>' + s.slice(val.length);
    } else {
      item.textContent = s;
    }
    item.addEventListener('mousedown', e => {
      e.preventDefault(); // prevent blur
      acPick(id, type, s);
    });
    list.appendChild(item);
  });
  
  document.body.appendChild(list);
}

function acHideDropdown(id) {
  const old = document.getElementById('aclist-' + id);
  if (old) old.remove();
}

function acRepositionAll() {
  document.querySelectorAll('.ac-list').forEach(list => {
    const id = list.id.replace('aclist-', '');
    const el = document.getElementById(id);
    if (!el) { list.remove(); return; }
    const rect = el.getBoundingClientRect();
    const viewportWidth = window.innerWidth;
    list.style.top = (rect.bottom + 4) + 'px';
    list.style.left = rect.left + 'px';
    list.style.minWidth = rect.width + 'px';
    list.style.maxWidth = (viewportWidth - rect.left - 12) + 'px';
  });
}
window.addEventListener('scroll', acRepositionAll, true);
window.addEventListener('resize', acRepositionAll);

function acPick(id, type, val) {
  const el = document.getElementById(id);
  if (el) {
    el.value = val;
    el.dataset.acIdx = '0';
    el.focus();
  }
  acHideDropdown(id);
}

function acOnInput(id, type) {
  const el = document.getElementById(id);
  if (el) el.dataset.acIdx = '0';
  acRenderDropdown(id, type);
}

function acOnKey(e, id, type) {
  const el = document.getElementById(id);
  if (!el) return;
  const list = document.getElementById('aclist-' + id);
  if (!list) return;
  const items = list.querySelectorAll('.ac-item');
  let idx = parseInt(el.dataset.acIdx || '0');
  
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    idx = Math.min(idx + 1, items.length - 1);
    el.dataset.acIdx = idx;
    items.forEach((it, i) => it.classList.toggle('active', i === idx));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    idx = Math.max(idx - 1, 0);
    el.dataset.acIdx = idx;
    items.forEach((it, i) => it.classList.toggle('active', i === idx));
  } else if (e.key === 'Enter' || e.key === 'Tab') {
    const val = items[idx] ? items[idx].textContent : null;
    if (val) { e.preventDefault(); acPick(id, type, val); }
  } else if (e.key === 'Escape') {
    acHideDropdown(id);
  }
}

function renderSmartInput(id, label, placeholder, type) {
  return `<label style="display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.5px">${label}</label>
    <div style="position:relative">
      <input id="${id}" placeholder="${placeholder}"
        oninput="acOnInput('${id}','${type}')"
        onkeydown="acOnKey(event,'${id}','${type}')"
        onfocus="acOnInput('${id}','${type}')"
        onblur="setTimeout(()=>acHideDropdown('${id}'),150)"
        autocomplete="off"
      />
    </div>`;
}

// ============================================================
// SECTION 21 — GOOGLE DRIVE PDF PREVIEW OVERLAY
// getDrivePreviewUrl converts share links to /preview embeds.
// openDrivePreview creates a full-screen overlay with <iframe>,
// "Open in Drive" button, close on backdrop/Escape, and a
// fallback message if Google blocks the embed (403).
// ============================================================
// ── PDF Drive Preview ──────────────────────────────────────────────
function getDrivePreviewUrl(link) {
  // Convert any Drive share/view link to the /preview embed URL
  const m = link.match(/\/file\/d\/([^\/\?]+)/);
  if (m) return `https://drive.google.com/file/d/${m[1]}/preview`;
  // Already a preview link
  if (link.includes('/preview')) return link;
  return link;
}

function openDrivePreview(fid) {
  const f = files.find(x => x.id === fid);
  if (!f || !f.driveLink) return;
  const previewUrl = getDrivePreviewUrl(f.driveLink);

  // Remove any existing overlay
  const existing = document.getElementById('pdf-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'pdf-overlay';
  overlay.innerHTML = `
    <div class="pdf-modal">
      <div class="pdf-header">
        <span class="pdf-title">${f.name}</span>
        <div class="pdf-actions">
          <a href="${f.driveLink}" target="_blank" rel="noopener"
            style="display:inline-flex;align-items:center;gap:5px;padding:0 11px;height:28px;border-radius:8px;background:rgba(66,133,244,.15);border:1px solid rgba(66,133,244,.35);color:#6fa8f5;font-size:11.5px;font-weight:600;text-decoration:none;transition:background .15s"
            onmouseover="this.style.background='rgba(66,133,244,.28)'" onmouseout="this.style.background='rgba(66,133,244,.15)'">
            Open in Drive ↗
          </a>
          <button onclick="document.getElementById('pdf-overlay').remove()"
            style="background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;width:28px;height:28px;padding:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s"
            onmouseover="this.style.background='rgba(239,68,68,.12)';this.style.color='var(--red)';this.style.borderColor='rgba(239,68,68,.28)'"
            onmouseout="this.style.background='transparent';this.style.color='var(--muted)';this.style.borderColor='var(--border)'">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
      <iframe id="pdf-iframe" src="${previewUrl}" allow="autoplay" loading="lazy"
        onload="(function(f){try{var d=f.contentDocument||f.contentWindow&&f.contentWindow.document;if(!d||!d.body||d.body.innerHTML==='')throw 0;}catch(e){}})(this)"
      ></iframe>
      <div class="pdf-login-msg" id="pdf-fallback" style="display:none">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <div style="font-size:15px;font-weight:600;color:var(--text)">Preview unavailable</div>
        <div style="font-size:13px;color:var(--muted);max-width:320px;line-height:1.55">Google Drive blocked the embed (403). The file may be private or not shared publicly. Open it directly in Drive to view.</div>
        <a href="${f.driveLink}" target="_blank" rel="noopener"
          style="margin-top:4px;display:inline-flex;align-items:center;gap:6px;padding:0 18px;height:36px;border-radius:10px;background:rgba(66,133,244,.18);border:1px solid rgba(66,133,244,.4);color:#6fa8f5;font-size:13px;font-weight:600;text-decoration:none;transition:background .15s"
          onmouseover="this.style.background='rgba(66,133,244,.32)'" onmouseout="this.style.background='rgba(66,133,244,.18)'">
          Open in Drive ↗
        </a>
      </div>
    </div>`;

  // Close on backdrop click
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  // Close on Escape
  const onKey = e => { if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', onKey); } };
  document.addEventListener('keydown', onKey);

  document.body.appendChild(overlay);

  // Detect if Google blocks the iframe (403 / cross-origin refusal)
  const iframe = document.getElementById('pdf-iframe');
  const fallback = document.getElementById('pdf-fallback');
  if (iframe && fallback) {
    const showFallback = () => {
      iframe.style.display = 'none';
      fallback.style.display = 'flex';
    };
    iframe.addEventListener('load', () => {
      setTimeout(() => {
        try {
          const doc = iframe.contentDocument;
          if (!doc || !doc.body || doc.body.innerHTML.trim() === '') showFallback();
        } catch (e) {
          // Cross-origin and loaded — leave iframe visible; user will see error if 403.
        }
      }, 800);
    });
    // If iframe never fires load within 12 s, show fallback
    const timeout = setTimeout(() => { if (fallback.style.display === 'none') showFallback(); }, 12000);
    iframe.addEventListener('load', () => clearTimeout(timeout), { once: true });
  }
}

  if(!name) return '';
  return name.trim().split(/\s+/).map(w=>w[0].toUpperCase()+'.').join(' ');
}
// Display name used in borrow/return boxes
function displayName(u){
  if(!u) return '';
  if(u.abbrev) return u.abbrev;
  if(u.role!=='admin' && u.title==='Lawyer') return lawyerAbbrev(u.name);
  return u.name;
}
// Get display name from a borrower name string (looks up user by email then name, falls back to stored name)
function borrowerDisplay(nameStr, emailStr){
  if(!nameStr) return '';
  const u = (emailStr && users.find(u => u.email === emailStr))
          || users.find(u => u.name === nameStr);
  if(u) return displayName(u);
  return nameStr;
}

function updateAbbrevPreview(){

  const first = (document.getElementById('ap-firstname')?.value || '').trim();
  const last  = (document.getElementById('ap-lastname')?.value  || '').trim();
  const abbrevEl = document.getElementById('ap-abbrev');
  if(!abbrevEl) return;
  const fullName = [first, last].filter(Boolean).join(' ');
  abbrevEl.value = fullName ? lawyerAbbrev(fullName) : '';
}
function onAbbrevManualEdit(){ _abbrevManuallyEdited = true; }
function onNameFieldChange(){ _abbrevManuallyEdited = false; updateAbbrevPreview(); }

function doSaveName(){
  const firstEl  = document.getElementById('ap-firstname');
  const lastEl   = document.getElementById('ap-lastname');
  const abbrevEl = document.getElementById('ap-abbrev');
  const msgEl    = document.getElementById('ap-msg');
  if(!firstEl || !msgEl) return;
  const first = firstEl.value.trim();
  const last  = lastEl ? lastEl.value.trim() : '';
  if(!first){ msgEl.style.color='var(--red)'; msgEl.textContent='First name is required.'; return; }
  const name = [first, last].filter(Boolean).join(' ');
  const isLawyer = currentUser.title === 'Lawyer';
  const rawAbbrev = abbrevEl ? abbrevEl.value.trim() : '';
  const abbrev = isLawyer ? (rawAbbrev || lawyerAbbrev(name)) : '';
  const oldName = currentUser.name;
  currentUser.name   = name;
  currentUser.abbrev = abbrev;
  const u = users.find(u => u.id === currentUser.id);
  if(u){ u.name = name; u.abbrev = abbrev; }
  // Update stored borrower name in all history entries
  files.forEach(f => {
    let touched=false;
    if(f.borrower && (f.borrowerEmail === currentUser.email || f.borrower === oldName)){ f.borrower = name; touched=true; }
    (f.borrowHistory||[]).forEach(h => {
      if(h.borrowerEmail === currentUser.email || h.borrower === oldName) {
        h.borrower = name;
        if(!h.borrowerEmail) h.borrowerEmail = currentUser.email;
        touched=true;
      }
    });
    if(touched) syncFileToDb(f);
  });
  syncUserToDb(currentUser);
  msgEl.style.color='var(--green)';
  msgEl.textContent=isLawyer?`Name saved as "${name}" · Abbrev: ${abbrev}`:`Name saved as "${name}"`;
  showToast('Name updated');
  setTimeout(()=>render(), 1200);
}

function doChangePassword(){
  const cur = (document.getElementById('pw-cur')?.value || '');
  const nw  = (document.getElementById('pw-new')?.value || '');
  const cf  = (document.getElementById('pw-conf')?.value || '');
  const msgEl = document.getElementById('pw-msg');
  if(!msgEl) return;
  msgEl.textContent = '';
  if(nw.length < 6){
    msgEl.style.color='var(--red)'; msgEl.textContent='New password must be at least 6 characters.'; return;
  }
  if(nw !== cf){
    msgEl.style.color='var(--red)'; msgEl.textContent='Passwords do not match.'; return;
  }
  const cred=firebase.auth.EmailAuthProvider.credential(currentUser.email, cur);
  auth.currentUser.reauthenticateWithCredential(cred).then(()=>{
    return auth.currentUser.updatePassword(nw);
  }).then(()=>{
    msgEl.style.color='var(--green)';
    msgEl.textContent='Password updated successfully!';
    showToast('Password updated');
    ['pw-cur','pw-new','pw-conf'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
  }).catch(err=>{
    msgEl.style.color='var(--red)';
    msgEl.textContent = err.code==='auth/wrong-password' ? 'Current password is incorrect.' : (err.message||'Could not update password.');
  });
}

function saveAdminUserEdit(uid){
  const roleEl = document.getElementById('adm-edit-role-'+uid);
  const u = users.find(u=>u.id===uid);
  if(!u) return;
  if(roleEl){
    const rv = roleEl.value; // 'lawyer' or 'staff'
    u.role = 'user';
    u.title = rv==='lawyer' ? 'Lawyer' : 'Staff';
    if(rv==='lawyer') u.abbrev = u.abbrev || lawyerAbbrev(u.name);
    else u.abbrev = '';
  }
  syncUserToDb(u);
  adminEditUserId = null;
  render();
}

function admSetRole(uid, role, btn){
  document.getElementById('adm-edit-role-'+uid).value = role;
  btn.closest('.role-picker').querySelectorAll('.role-opt').forEach(b=>b.classList.remove('role-opt-active'));
  btn.classList.add('role-opt-active');
}

function approveUser(uid){
  const roleEl=document.getElementById('adm-edit-role-'+uid);
  const u=users.find(u=>u.id===uid);
  if(!u) return;
  const rv=roleEl?roleEl.value:'lawyer'; // 'lawyer' or 'staff'
  u.role='user';
  u.title=rv==='lawyer'?'Lawyer':'Staff';
  if(rv==='lawyer') u.abbrev=u.abbrev||lawyerAbbrev(u.name);
  else u.abbrev='';
  syncUserToDb(u);
  adminEditUserId=null;
  render();
  showResetEmailPrompt(u.email, u.name);
}

function restoreRejectedUser(uid){
  const entry = rejectedUsers.find(r=>r.id===uid);
  if(!entry) return;
  const profile = {id:uid, name:entry.name, email:entry.email, role:'pending', title:'Pending', avatar:null};
  const batch = db.batch();
  batch.set(usersCol.doc(uid), profile);
  batch.delete(rejectedUsersCol.doc(uid));
  batch.commit().then(()=>{
    const ridx = rejectedUsers.findIndex(r=>r.id===uid);
    if(ridx>-1) rejectedUsers.splice(ridx,1);
    const uidx = users.findIndex(u=>u.id===uid);
    if(uidx>-1) users[uidx]=profile; else users.push(profile);
    render();
    if(entry.email){
      auth.sendPasswordResetEmail(entry.email).then(()=>{
        showToast(`Password reset email sent to ${entry.email}`, 'success');
      }).catch(e=>{
        console.error('reset email failed:', e);
        showToast(`Could not send reset email: ${e.message||e}`, 'error');
      });
    }
  }).catch(e=>console.error('restoreRejectedUser failed:',e));
}

// ── Long-press handler for avatar + banner ────────────────────────────
// Called after every render of the account page to wire up the gestures.
function attachImgLongPress(){
  _attachZone('acct-avatar-zone', 'avatar');
  _attachZone('acct-banner-zone', 'banner');
}

function _attachZone(elId, target){
  const el = document.getElementById(elId);
  if(!el) return;

  let _timer = null;
  let _fired = false;      // did the long-press fire this touch?
  let _moved = false;      // did the finger move too much?
  let _startX = 0, _startY = 0;
  const HOLD_MS   = 500;   // ms before long-press fires
  const MOVE_PX   = 8;     // px movement threshold — cancel if exceeded

  function _cancel(){
    clearTimeout(_timer);
    _timer = null;
    // Remove press feedback
    if(target === 'avatar'){
      el.style.transform = '';
      el.style.boxShadow = '0 4px 14px rgba(0,0,0,.4)';
    } else {
      el.style.filter = '';
    }
  }

  function _start(x, y){
    _fired = false; _moved = false;
    _startX = x; _startY = y;
    // Subtle press-in feedback
    if(target === 'avatar'){
      el.style.transform = 'scale(.95)';
      el.style.boxShadow = '0 2px 8px rgba(0,0,0,.3)';
    } else {
      el.style.filter = 'brightness(.85)';
    }
    _timer = setTimeout(()=>{
      if(_moved) return;
      _fired = true;
      _cancel();
      // Haptic feedback if available
      if(navigator.vibrate) navigator.vibrate(30);
      showImgActionSheet(target);
    }, HOLD_MS);
  }

  function _move(x, y){
    if(Math.abs(x - _startX) > MOVE_PX || Math.abs(y - _startY) > MOVE_PX){
      _moved = true;
      _cancel();
    }
  }

  function _end(){
    const wasFired = _fired;
    _cancel();
    // If long-press didn't fire, treat as a short tap → view lightbox (only if image exists)
    if(!wasFired && !_moved){
      const hasImg = target === 'avatar' ? !!currentUser.avatar : !!currentUser.banner;
      if(hasImg) showImgLightbox(target);
    }
  }

  // Touch events (mobile)
  el.addEventListener('touchstart', e => {
    const t = e.touches[0];
    _start(t.clientX, t.clientY);
  }, {passive: true});
  el.addEventListener('touchmove', e => {
    const t = e.touches[0];
    _move(t.clientX, t.clientY);
  }, {passive: true});
  el.addEventListener('touchend',    _end);
  el.addEventListener('touchcancel', _cancel);

  // Mouse events (desktop fallback — right-click still works via contextmenu)
  el.addEventListener('mousedown', e => { if(e.button === 0) _start(e.clientX, e.clientY); });
  el.addEventListener('mousemove', e => _move(e.clientX, e.clientY));
  el.addEventListener('mouseup',   _end);
  el.addEventListener('mouseleave', _cancel);
  el.addEventListener('contextmenu', e => { e.preventDefault(); showImgActionSheet(target); });
}
