function _openCropOverlay(src){
  const overlay = document.getElementById('crop-overlay');
  const canvas  = document.getElementById('crop-canvas');
  const title   = document.getElementById('crop-title');
  const slider  = document.getElementById('crop-zoom-slider');
  if(!overlay||!canvas) return;

  const isAvatar = _cropTarget === 'avatar';
  title.textContent = isAvatar ? 'Crop Profile Picture' : 'Crop Header Image';

  // Canvas dimensions
  const maxW = Math.min(window.innerWidth - 32, 560);
  let cw, ch;
  if(isAvatar){ cw = ch = Math.min(maxW, 400); }
  else        { cw = maxW; ch = Math.round(cw * (88/480)); ch = Math.max(ch, 120); ch = ch * 3; } // 3x taller so dimmed context shows above/below
  canvas.width  = cw * window.devicePixelRatio;
  canvas.height = ch * window.devicePixelRatio;
  canvas.style.width  = cw + 'px';
  canvas.style.height = ch + 'px';

  // Load image
  _cropSrc = new Image();
  _cropSrc.onload = () => {
    // Crop window fills 100% of canvas — no dark border padding
    const cropW = cw;
    const cropH = isAvatar ? ch : Math.round(ch / 3); // banner: only the center strip is the actual crop
    const scaleX = cropW / _cropSrc.naturalWidth;
    const scaleY = cropH / _cropSrc.naturalHeight;
    _minScale = Math.max(scaleX, scaleY);
    _scale = _minScale;
    _cx = cw / 2;
    _cy = ch / 2;
    slider.min   = 100;
    slider.max   = 400;
    slider.value = 100;
    _drawCrop();
    overlay.style.display = 'flex';
  };
  _cropSrc.src = src;

  // Events — remove then re-add
  canvas.onmousedown  = _cropMouseDown;
  canvas.onmousemove  = _cropMouseMove;
  canvas.onmouseup    = _cropMouseUp;
  canvas.onmouseleave = _cropMouseUp;
  canvas.onwheel      = _cropWheel;
  canvas.ontouchstart = _cropTouchStart;
  canvas.ontouchmove  = _cropTouchMove;
  canvas.ontouchend   = _cropTouchEnd;
}

function _drawCrop(){
  const canvas = document.getElementById('crop-canvas');
  if(!canvas||!_cropSrc) return;
  const dpr = window.devicePixelRatio;
  const cw = canvas.width / dpr, ch = canvas.height / dpr;
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const isAvatar = _cropTarget === 'avatar';

  // Helper: rounded-square path
  const _rrect = (x, y, w, h, r) => {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  };

  // Step 1: Draw full image dimmed
  ctx.globalAlpha = 1;
  ctx.save();
  ctx.translate(_cx, _cy);
  ctx.scale(_scale, _scale);
  ctx.drawImage(_cropSrc, -_cropSrc.naturalWidth/2, -_cropSrc.naturalHeight/2);
  ctx.restore();

  // Step 2: Dim overlay over everything
  ctx.globalAlpha = 0.62;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, cw, ch);
  ctx.globalAlpha = 1;

  // Step 3: Redraw image at full brightness clipped to the crop zone only
  const cropStripH = isAvatar ? ch : Math.round(ch / 3);
  const cropStripY = isAvatar ? 0 : (ch - cropStripH) / 2;

  ctx.save();
  if(isAvatar){
    const s = Math.min(cw, ch);
    const x = (cw - s) / 2, y = (ch - s) / 2;
    const cr = s * 0.25;
    _rrect(x, y, s, s, cr);
    ctx.clip();
  } else {
    // Rounded rect matching the header's 20px radius (scaled to canvas width)
    const r = 20 * (cw / Math.min(window.innerWidth - 32, 560));
    _rrect(0, cropStripY, cw, cropStripH, r);
    ctx.clip();
  }
  ctx.translate(_cx, _cy);
  ctx.scale(_scale, _scale);
  ctx.drawImage(_cropSrc, -_cropSrc.naturalWidth/2, -_cropSrc.naturalHeight/2);
  ctx.restore();

  // Step 4: Crop border / indicator
  if(isAvatar){
    const s = Math.min(cw, ch);
    const x = (cw - s) / 2, y = (ch - s) / 2;
    const cr = s * 0.25;
    _rrect(x, y, s, s, cr);
    ctx.strokeStyle = 'rgba(255,255,255,.3)';
    ctx.lineWidth = 2;
    ctx.stroke();
  } else {
    // Subtle rounded border around the banner crop strip
    const r = 20 * (cw / Math.min(window.innerWidth - 32, 560));
    _rrect(0.75, cropStripY + 0.75, cw - 1.5, cropStripH - 1.5, r);
    ctx.strokeStyle = 'rgba(255,255,255,.4)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

function _clampPos(){
  const canvas = document.getElementById('crop-canvas');
  if(!canvas||!_cropSrc) return;
  const dpr = window.devicePixelRatio;
  const cw = canvas.width/dpr, ch = canvas.height/dpr;
  const isAvatar = _cropTarget === 'avatar';
  // Clamp so image always covers the crop window
  const cropW = cw;
  const cropH = isAvatar ? ch : Math.round(ch / 3);
  const cropX = 0;
  const cropY = isAvatar ? 0 : (ch - cropH) / 2;
  const hw = (_cropSrc.naturalWidth  * _scale) / 2;
  const hh = (_cropSrc.naturalHeight * _scale) / 2;
  _cx = Math.min(Math.max(_cx, cropX + cropW - hw), cropX + hw);
  _cy = Math.min(Math.max(_cy, cropY + cropH - hh), cropY + hh);
}

function _cropMouseDown(e){ _drag=true; _lastX=e.offsetX; _lastY=e.offsetY; e.target.style.cursor='grabbing'; }
function _cropMouseMove(e){
  if(!_drag) return;
  _cx += e.offsetX - _lastX; _cy += e.offsetY - _lastY;
  _lastX=e.offsetX; _lastY=e.offsetY;
  _clampPos(); _drawCrop();
}
function _cropMouseUp(e){ _drag=false; e.target.style.cursor='grab'; }
function _cropWheel(e){
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.07 : 0.07;
  _scale = Math.max(_minScale, Math.min(_scale * (1 + delta), _minScale * 4));
  _clampPos(); _drawCrop();
  // sync slider
  const slider = document.getElementById('crop-zoom-slider');
  if(slider) slider.value = Math.round((_scale / _minScale - 1) / 3 * 300 + 100);
}

function _cropTouchStart(e){
  e.preventDefault();
  if(e.touches.length === 1){ _drag=true; _lastX=e.touches[0].clientX; _lastY=e.touches[0].clientY; }
  else if(e.touches.length === 2){ _pinchDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY); }
}
function _cropTouchMove(e){
  e.preventDefault();
  if(e.touches.length === 1 && _drag){
    _cx += e.touches[0].clientX - _lastX; _cy += e.touches[0].clientY - _lastY;
    _lastX=e.touches[0].clientX; _lastY=e.touches[0].clientY;
    _clampPos(); _drawCrop();
  } else if(e.touches.length === 2){
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    _scale = Math.max(_minScale, Math.min(_scale * (d/_pinchDist), _minScale*4));
    _pinchDist = d; _clampPos(); _drawCrop();
  }
}
function _cropTouchEnd(e){ _drag=false; }

function cropZoomSlider(val){
  // val 100-400 maps to 1x-4x of minScale
  _scale = _minScale * (1 + (val - 100) / 300 * 3);
  // Update track fill
  const pct = ((val - 100) / 300 * 100).toFixed(1) + '%';
  const sl = document.getElementById('crop-zoom-slider');
  if(sl) sl.style.setProperty('--pct', pct);
  _clampPos(); _drawCrop();
}

function closeCropOverlay(){
  document.getElementById('crop-overlay').style.display='none';
  _cropSrc = null;
}

function applyCrop(){
  const canvas = document.getElementById('crop-canvas');
  if(!canvas||!_cropSrc) return;
  const dpr = window.devicePixelRatio;
  const cw = canvas.width/dpr, ch = canvas.height/dpr;
  const isAvatar = _cropTarget === 'avatar';

  // Create output canvas
  let outSize, outW, outH;
  if(isAvatar){ outSize = 400; outW = outH = outSize; }
  else        { outW = 960; outH = Math.round(960 * (88/480)); } // banner: fixed aspect ratio output

  const out = document.createElement('canvas');
  out.width = outW; out.height = outH;
  const octx = out.getContext('2d');

  // For banner: offset _cy by the crop strip top so we export only the center strip
  const exportCy = isAvatar ? _cy : _cy - (ch - Math.round(ch/3)) / 2;

  const scaleRatio = outW / cw;
  octx.save();
  if(isAvatar){
    // Rounded square — 25% corner radius, matching border-radius:14px on 56px
    const cr = outW * 0.25;
    octx.beginPath();
    octx.moveTo(cr, 0);
    octx.lineTo(outW - cr, 0);
    octx.quadraticCurveTo(outW, 0, outW, cr);
    octx.lineTo(outW, outH - cr);
    octx.quadraticCurveTo(outW, outH, outW - cr, outH);
    octx.lineTo(cr, outH);
    octx.quadraticCurveTo(0, outH, 0, outH - cr);
    octx.lineTo(0, cr);
    octx.quadraticCurveTo(0, 0, cr, 0);
    octx.closePath();
    octx.clip();
  }
  octx.translate(_cx * scaleRatio, exportCy * scaleRatio);
  octx.scale(_scale * scaleRatio, _scale * scaleRatio);
  octx.drawImage(_cropSrc, -_cropSrc.naturalWidth/2, -_cropSrc.naturalHeight/2);
  octx.restore();

  const dataUrl = out.toDataURL('image/jpeg', 0.92);

  if(isAvatar){
    currentUser.avatar = dataUrl;
    const u = users.find(u=>u.id===currentUser.id); if(u) u.avatar=dataUrl;
  } else {
    currentUser.banner = dataUrl;
    const u = users.find(u=>u.id===currentUser.id); if(u) u.banner=dataUrl;
  }
  syncUserToDb(currentUser);
  closeCropOverlay();
  render();
}

function deleteAvatar(){
  ['avatar-ctx'].forEach(id=>{const m=document.getElementById(id);if(m)m.style.display='none';});
  currentUser.avatar=null;
  const u=users.find(u=>u.id===currentUser.id);if(u)u.avatar=null;
  syncUserToDb(currentUser);

}
function deleteBanner(){
  ['banner-ctx'].forEach(id=>{const m=document.getElementById(id);if(m)m.style.display='none';});
  currentUser.banner=null;
  const u=users.find(u=>u.id===currentUser.id);if(u)u.banner=null;
  syncUserToDb(currentUser);
  render();
}

// SECTION 23 — attachApp() & FLOATING SCROLL-TO-TOP BUTTON
//
//   attachApp()        — called by render() after each paint.
//                        Wires:
//                          • Enter key on Lookup input
//                          • Auto-focuses the global search box

//   initScrollTop() IIFE — injects one persistent floating
//                        "↑ Back to Top" button into <body>

// Lookup page autocomplete
let _luAcIdx = -1;
function luAcUpdate(){
  const inp = document.getElementById('lu-input');
  const list = document.getElementById('lu-ac-list');
  if(!inp||!list) return;

  const matches = files.filter(f=>f.id.toUpperCase().includes(q)||f.name.toUpperCase().includes(q)).slice(0,8);
  if(!matches.length){ list.style.display='none'; return; }
  list.innerHTML = matches.map((f,i)=>`<div data-idx="${i}" style="padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;gap:8px;align-items:center" onmousedown="luAcPick('${esc(f.id)}')" onmouseover="luAcHover(${i})"><code style="font-size:11px;color:var(--accent2);font-weight:700;background:var(--surface2);padding:2px 7px;border-radius:5px;white-space:nowrap">${esc(f.id)}</code><span style="color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(f.name)}</span></div>`).join('');
  list.style.display='block';
  _luAcIdx=-1;
}
function luAcHover(i){ _luAcIdx=i; luAcHighlight(); }
function luAcHighlight(){
  const list=document.getElementById('lu-ac-list'); if(!list)return;
  [...list.children].forEach((el,i)=>{ el.style.background=i===_luAcIdx?'var(--surface2)':''; });
}
function luAcPick(id){
  const inp=document.getElementById('lu-input'); if(inp)inp.value=id;
  const list=document.getElementById('lu-ac-list'); if(list)list.style.display='none';
  openScan(id);
}
function luAcKey(e){
  const list=document.getElementById('lu-ac-list'); if(!list||list.style.display==='none') return;
  const items=list.children;
  if(e.key==='ArrowDown'){ e.preventDefault(); _luAcIdx=Math.min(_luAcIdx+1,items.length-1); luAcHighlight(); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); _luAcIdx=Math.max(_luAcIdx-1,0); luAcHighlight(); }
  else if(e.key==='Enter' && _luAcIdx>=0){ e.preventDefault(); const sel=items[_luAcIdx]; if(sel) luAcPick(sel.querySelector('code').textContent); }
  else if(e.key==='Escape'){ list.style.display='none'; _luAcIdx=-1; }
}
document.addEventListener('click', e=>{ if(!e.target.closest('#lu-ac-list')&&!e.target.closest('#lu-input')){ const l=document.getElementById('lu-ac-list'); if(l)l.style.display='none'; } });

function attachApp(){

  const gs=document.getElementById('gs-input');

  const inInput = ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName);
  if((e.key==='/' && !inInput) || ((e.ctrlKey||e.metaKey) && e.key==='f')){

// Floating scroll-to-top — injected once, observed after every render
(function initScrollTop(){
  if(document.getElementById('scroll-top-btn'))return;
  const btn=document.createElement('button');
  btn.id='scroll-top-btn';
  btn.title='Back to top';
  btn.innerHTML=`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 19V5"/>
    <polyline points="5 12 12 5 19 12"/>
    <line x1="5" y1="21" x2="19" y2="21" stroke-width="1.5" opacity="0.45"/>
  </svg>`;
  btn.style.cssText=`
    position:fixed;bottom:28px;right:28px;z-index:9999;
    width:46px;height:46px;border-radius:50%;border:none;cursor:pointer;
    background:var(--accent);color:#fff;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 18px rgba(0,0,0,.45),0 0 0 1px rgba(255,255,255,.08);
    opacity:0;pointer-events:none;
    transition:opacity .22s ease,transform .22s ease;
    transform:translateY(8px);
  `;
  btn.onclick=()=>{
    const main=document.querySelector('.main');
    if(main)main.scrollTo({top:0,behavior:'smooth'});
    else window.scrollTo({top:0,behavior:'smooth'});
  };
  btn.onmouseover=()=>{btn.style.background='#b8941e';btn.style.transform='translateY(-2px)'};
  btn.onmouseout=()=>{btn.style.background='var(--accent)';btn.style.transform=btn._visible?'translateY(0)':'translateY(8px)'};
  document.body.appendChild(btn);
})();

let _scrollObserver=null;
function attachScrollTop(){
  const header=document.getElementById('registry-header');
  const btn=document.getElementById('scroll-top-btn');
  if(!btn)return;
  if(_scrollObserver)_scrollObserver.disconnect();
  if(!header){
    // Not on dashboard — hide button
    btn.style.opacity='0';btn.style.pointerEvents='none';btn._visible=false;
    return;
  }
  const main=document.querySelector('.main');
  _scrollObserver=new IntersectionObserver(([entry])=>{
    const visible=!entry.isIntersecting;
    btn._visible=visible;
    btn.style.opacity=visible?'1':'0';
    btn.style.pointerEvents=visible?'auto':'none';
    btn.style.transform=visible?'translateY(0)':'translateY(8px)';
  },{root:main||null,threshold:0});
  _scrollObserver.observe(header);
}


// ============================================================
// SECTION 24 — SMART AUTOCOMPLETE FOR FORM INPUTS
// Provides live dropdown suggestions as the user types in the
// Add / Edit modal form fields. All suggestions come from the
// existing files[] data — no external API needed.
//
//   getFolderIdSuggestions(typed) — suggests folder ID prefixes
//                   (e.g. "2016-PRC") derived from existing IDs.
//   getLocationSuggestions()     — exact cabinet/row strings.
//   getCaseNoSuggestions()       — prefix before the trailing
//                   number (e.g. "Administrative Case No.")
//   getCourtSuggestions()        — exact court/agency strings.
//   getCaseNatureSuggestions()   — exact nature-of-case strings.
//
//   acRenderDropdown(id, type)   — positions and injects a
//                   floating <div.ac-list> below the input,
//                   bolding the already-typed prefix in each item.
//   acHideDropdown(id)           — removes the dropdown element.
//   acRepositionAll()            — repositions all open dropdowns
//                   on scroll/resize so they stay anchored.
//   acPick(id, type, val)        — sets the input value and hides
//                   the dropdown when a suggestion is selected.
//   acOnInput / acOnKey          — oninput / onkeydown handlers;
//                   support Arrow Up/Down navigation, Enter/Tab
//                   to confirm, Escape to dismiss.
//   renderSmartInput(id, label, placeholder, type)
//                              — returns the HTML for a labelled
//                   <input> wired with the four AC event hooks.
// ============================================================
// ── Smart Autocomplete ─────────────────────────────────────────────
function getFolderIdSuggestions(typed) {
  if (!typed) return [];
  const t = typed.toLowerCase();
  // Collect only real prefixes (everything except the final unique number segment)
  const prefixes = new Set();
  files.forEach(f => {
    const segs = f.id.split('-');
    let built = '';
    for (let i = 0; i < segs.length - 1; i++) {
      built = i === 0 ? segs[i] : built + '-' + segs[i];
      prefixes.add(built);
    }
  });
  return [...prefixes]
    .filter(s => s.toLowerCase().startsWith(t) && s.toLowerCase() !== t)
    .sort()
    .slice(0, 8);
}

function getLocationSuggestions(typed) {
  if (!typed) return [];
  const t = typed.toLowerCase();
  const all = [...new Set(files.map(f => f.location).filter(Boolean))];
  // Only return exact presaved locations that start with what was typed
  return all
    .filter(s => s.toLowerCase().startsWith(t) && s.toLowerCase() !== t)
    .sort()
    .slice(0, 8);
}

function getCaseNoSuggestions(typed) {
  if (!typed) return [];
  const t = typed.toLowerCase();
  // Only the prefix part (strip trailing unique number) of each presaved caseNo
  const prefixes = new Set();
  files.forEach(f => {
    if (!f.caseNo) return;
    const match = f.caseNo.match(/^(.*?(?:No\.|#)\s*)\d+/i);
    if (match) prefixes.add(match[1].trimEnd());
  });
  return [...prefixes]
    .filter(s => s.toLowerCase().startsWith(t) && s.toLowerCase() !== t)
    .sort()
    .slice(0, 8);
}

function getCourtSuggestions(typed) {
  if (!typed) return [];
  const t = typed.toLowerCase();
  const all = [...new Set(files.map(f => f.court).filter(Boolean))];
  // Return exact presaved court strings that contain the typed text anywhere
  return all
    .filter(s => s.toLowerCase().startsWith(t) && s.toLowerCase() !== t)
    .sort((a, b) => a.localeCompare(b))
    .slice(0, 8);
}

function getCaseNatureSuggestions(typed) {
  if (!typed) return [];
  const t = typed.toLowerCase();
  const all = [...new Set(files.map(f => f.caseNature).filter(Boolean))];
  // Return exact presaved nature strings that contain the typed text anywhere
  return all
    .filter(s => s.toLowerCase().startsWith(t) && s.toLowerCase() !== t)
    .sort((a, b) => a.localeCompare(b))
    .slice(0, 8);
}

// Render just the dropdown list — never touches the input itself
function acRenderDropdown(id, type) {
  const el = document.getElementById(id);
  if (!el) return;
  const val = el.value;
  const suggestions = type === 'folderid' ? getFolderIdSuggestions(val)
    : type === 'location' ? getLocationSuggestions(val)
    : type === 'caseno' ? getCaseNoSuggestions(val)
    : type === 'court' ? getCourtSuggestions(val)
    : type === 'nature' ? getCaseNatureSuggestions(val)
    : [];
  
  // Remove existing dropdown
  const old = document.getElementById('aclist-' + id);
  if (old) old.remove();
  
  if (!suggestions.length) return;
  
  const list = document.createElement('div');
  list.className = 'ac-list';
  list.id = 'aclist-' + id;

  // Position using fixed coords so it floats above the form
  const rect = el.getBoundingClientRect();
  const viewportWidth = window.innerWidth;
  const PADDING = 12; // min gap from screen edge
  // Start at input left, expand right; clamp so it doesn't overflow
  const naturalLeft = rect.left;
  // We'll set width after measuring — start with min-width = input width
  list.style.top = (rect.bottom + 4) + 'px';
  list.style.left = naturalLeft + 'px';
  list.style.minWidth = rect.width + 'px';
  list.style.maxWidth = (viewportWidth - naturalLeft - PADDING) + 'px';

  let activeIdx = parseInt(el.dataset.acIdx || '0');
  
  suggestions.forEach((s, i) => {
    const item = document.createElement('div');
    item.className = 'ac-item' + (i === activeIdx ? ' active' : '');
    // Bold the typed portion
    const lo = val.toLowerCase();
    if (s.toLowerCase().startsWith(lo)) {
      item.innerHTML = '<em>' + s.slice(0, val.length) + '</em>' + s.slice(val.length);
    } else {
      item.textContent = s;
    }
    item.addEventListener('mousedown', e => {
      e.preventDefault(); // prevent blur
      acPick(id, type, s);
    });
    list.appendChild(item);
  });
  
  document.body.appendChild(list);
}

function acHideDropdown(id) {
  const old = document.getElementById('aclist-' + id);
  if (old) old.remove();
}

function acRepositionAll() {
  document.querySelectorAll('.ac-list').forEach(list => {
    const id = list.id.replace('aclist-', '');
    const el = document.getElementById(id);
    if (!el) { list.remove(); return; }
    const rect = el.getBoundingClientRect();
    const viewportWidth = window.innerWidth;
    list.style.top = (rect.bottom + 4) + 'px';
    list.style.left = rect.left + 'px';
    list.style.minWidth = rect.width + 'px';
    list.style.maxWidth = (viewportWidth - rect.left - 12) + 'px';
  });
}
window.addEventListener('scroll', acRepositionAll, true);
window.addEventListener('resize', acRepositionAll);

function acPick(id, type, val) {
  const el = document.getElementById(id);
  if (el) {
    el.value = val;
    el.dataset.acIdx = '0';
    el.focus();
  }
  acHideDropdown(id);
}

function acOnInput(id, type) {
  const el = document.getElementById(id);
  if (el) el.dataset.acIdx = '0';
  acRenderDropdown(id, type);
}

function acOnKey(e, id, type) {
  const el = document.getElementById(id);
  if (!el) return;
  const list = document.getElementById('aclist-' + id);
  if (!list) return;
  const items = list.querySelectorAll('.ac-item');
  let idx = parseInt(el.dataset.acIdx || '0');
  
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    idx = Math.min(idx + 1, items.length - 1);
    el.dataset.acIdx = idx;
    items.forEach((it, i) => it.classList.toggle('active', i === idx));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    idx = Math.max(idx - 1, 0);
    el.dataset.acIdx = idx;
    items.forEach((it, i) => it.classList.toggle('active', i === idx));
  } else if (e.key === 'Enter' || e.key === 'Tab') {
    const val = items[idx] ? items[idx].textContent : null;
    if (val) { e.preventDefault(); acPick(id, type, val); }
  } else if (e.key === 'Escape') {
    acHideDropdown(id);
  }
}

function renderSmartInput(id, label, placeholder, type) {
  return `<label style="display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.5px">${label}</label>
    <div style="position:relative">
      <input id="${id}" placeholder="${placeholder}"
        oninput="acOnInput('${id}','${type}')"
        onkeydown="acOnKey(event,'${id}','${type}')"
        onfocus="acOnInput('${id}','${type}')"
        onblur="setTimeout(()=>acHideDropdown('${id}'),150)"
        autocomplete="off"
      />
    </div>`;
}

// No global mousedown listener needed — onblur handles closing

// ============================================================
// SECTION 25 — GOOGLE DRIVE PDF PREVIEW OVERLAY
//
//   getDrivePreviewUrl(link) — converts any Drive share URL
//                   to the /preview embed format so it can be
//                   loaded inside an <iframe>.
//   openDrivePreview(fid)    — creates a full-screen overlay
//                   with an <iframe> pointing to the preview URL.
//                   Features:
//                     • "Open in Drive" external link button
//                     • Close on backdrop click or Escape key
//                     • Fallback message if Google blocks the
//                       embed (403 / private file): hides the
//                       iframe and shows an "Open in Drive"
//                       prompt instead. A 12-second timeout
//                       triggers the fallback if the iframe
//                       never fires a load event.
// ============================================================
// ── PDF Drive Preview ──────────────────────────────────────────────
function getDrivePreviewUrl(link) {
  // Convert any Drive share/view link to the /preview embed URL
  const m = link.match(/\/file\/d\/([^\/\?]+)/);
  if (m) return `https://drive.google.com/file/d/${m[1]}/preview`;
  // Already a preview link
  if (link.includes('/preview')) return link;
  return link;
}

function openDrivePreview(fid) {
  const f = files.find(x => x.id === fid);
  if (!f || !f.driveLink) return;
  const previewUrl = getDrivePreviewUrl(f.driveLink);

  // Remove any existing overlay
  const existing = document.getElementById('pdf-overlay');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'pdf-overlay';
  overlay.innerHTML = `
    <div class="pdf-modal">
      <div class="pdf-header">
        <span class="pdf-title">${f.name}</span>
        <div class="pdf-actions">
          <a href="${f.driveLink}" target="_blank" rel="noopener"
            style="display:inline-flex;align-items:center;gap:5px;padding:0 11px;height:28px;border-radius:8px;background:rgba(66,133,244,.15);border:1px solid rgba(66,133,244,.35);color:#6fa8f5;font-size:11.5px;font-weight:600;text-decoration:none;transition:background .15s"
            onmouseover="this.style.background='rgba(66,133,244,.28)'" onmouseout="this.style.background='rgba(66,133,244,.15)'">
            Open in Drive ↗
          </a>
          <button onclick="document.getElementById('pdf-overlay').remove()"
            style="background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;width:28px;height:28px;padding:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s"
            onmouseover="this.style.background='rgba(192,57,43,.12)';this.style.color='var(--red)';this.style.borderColor='rgba(192,57,43,.28)'"
            onmouseout="this.style.background='transparent';this.style.color='var(--muted)';this.style.borderColor='var(--border)'">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
      <iframe id="pdf-iframe" src="${previewUrl}" allow="autoplay" loading="lazy"
        onload="(function(f){try{var d=f.contentDocument||f.contentWindow&&f.contentWindow.document;if(!d||!d.body||d.body.innerHTML==='')throw 0;}catch(e){}})(this)"
      ></iframe>
      <div class="pdf-login-msg" id="pdf-fallback" style="display:none">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <div style="font-size:15px;font-weight:600;color:var(--text)">Preview unavailable</div>
        <div style="font-size:13px;color:var(--muted);max-width:320px;line-height:1.55">Google Drive blocked the embed (403). The file may be private or not shared publicly. Open it directly in Drive to view.</div>
        <a href="${f.driveLink}" target="_blank" rel="noopener"
          style="margin-top:4px;display:inline-flex;align-items:center;gap:6px;padding:0 18px;height:36px;border-radius:10px;background:rgba(66,133,244,.18);border:1px solid rgba(66,133,244,.4);color:#6fa8f5;font-size:13px;font-weight:600;text-decoration:none;transition:background .15s"
          onmouseover="this.style.background='rgba(66,133,244,.32)'" onmouseout="this.style.background='rgba(66,133,244,.18)'">
          Open in Drive ↗
        </a>
      </div>
    </div>`;

  // Close on backdrop click
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  // Close on Escape
  const onKey = e => { if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', onKey); } };
  document.addEventListener('keydown', onKey);

  document.body.appendChild(overlay);

  // Detect if Google blocks the iframe (403 / cross-origin refusal)
  const iframe = document.getElementById('pdf-iframe');
  const fallback = document.getElementById('pdf-fallback');
  if (iframe && fallback) {
    const showFallback = () => {
      iframe.style.display = 'none';
      fallback.style.display = 'flex';
    };
    iframe.addEventListener('load', () => {
      setTimeout(() => {
        try {
          const doc = iframe.contentDocument;
          if (!doc || !doc.body || doc.body.innerHTML.trim() === '') showFallback();
        } catch (e) {
          // Cross-origin and loaded — leave iframe visible; user will see error if 403.
        }
      }, 800);
    });
    // If iframe never fires load within 12 s, show fallback
    const timeout = setTimeout(() => { if (fallback.style.display === 'none') showFallback(); }, 12000);
    iframe.addEventListener('load', () => clearTimeout(timeout), { once: true });
  }
}
