<style>
/* ============================================================
   SECTION 2 — GLOBAL STYLES & CSS CUSTOM PROPERTIES (THEME)
   :root defines all design tokens (colors, radii, fonts,
   shadows) for DARK mode. :root.light overrides them for
   LIGHT mode. Toggling the "light" class on <html> switches
   the entire UI instantly via CSS cascade.
   Also includes:
     • Base resets (box-sizing, margin, padding)
     • Global element styles (body, button, input, select)
     • .role-picker / .role-opt — custom role toggle buttons
     • .theme-toggle — sliding pill for dark/light switch
     • @media print — hides everything except the QR print area
   ============================================================ */
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#07090f;--surface:#0d1120;--surface2:#131829;--border:#1e2640;
    --accent:#c9a227;--accent2:#f0c84a;--text:#eaecf4;--muted:#7880a0;
    --green:#22c55e;--amber:#f59e0b;--red:#c0392b;
    --navy:#0a1628;--gold:#c9a227;--gold2:#f0c84a;
    --radius:16px;--font:'Segoe UI',system-ui,sans-serif;
    --shadow-sm:0 2px 8px rgba(0,0,0,.4);
    --shadow-md:0 8px 32px rgba(0,0,0,.55);
    --shadow-lg:0 24px 64px rgba(0,0,0,.7);
    --blur:blur(20px)
  }
  :root.light{
    --bg:#f0f2f8;--surface:#ffffff;--surface2:#e8ebf4;--border:#d0d6e8;
    --accent:#b8911f;--accent2:#c9a227;--text:#111827;--muted:#5a6380;
    --green:#16a34a;--amber:#d97706;--red:#dc2626;
    --navy:#f0f2f8;--gold:#b8911f;--gold2:#c9a227;
    --shadow-sm:0 2px 8px rgba(0,0,0,.08);
    --shadow-md:0 8px 32px rgba(0,0,0,.12);
    --shadow-lg:0 24px 64px rgba(0,0,0,.18)
  }
  *{box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;font-size:14px}
  button{cursor:pointer;border:none;font-family:inherit;font-size:14px;transition:all .18s ease}
  input,select,textarea{font-family:inherit;font-size:14px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:10px 14px;width:100%;outline:none;transition:border .2s,box-shadow .2s}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(201,162,39,0.13)}
  input:-webkit-autofill,input:-webkit-autofill:hover,input:-webkit-autofill:focus,input:-webkit-autofill:active{
    -webkit-box-shadow:0 0 0 1000px var(--surface2) inset!important;
    box-shadow:0 0 0 1000px var(--surface2) inset!important;
    -webkit-text-fill-color:var(--text)!important;
    caret-color:var(--text);
    transition:background-color 5000s ease-in-out 0s;
  }
  select option{background:var(--surface)}

  /* Custom role picker */
  .role-picker{display:flex;gap:.4rem}
  .role-opt{
    flex:1;padding:9px 0;border-radius:9px;
    border:1.5px solid var(--border);
    background:var(--bg);color:var(--muted);
    font-size:13px;font-weight:600;cursor:pointer;
    transition:all .15s ease;letter-spacing:.2px;
  }
  .role-opt:hover{border-color:var(--accent);color:var(--accent2);background:rgba(201,162,39,.08)}
  .role-opt-active{
    background:rgba(201,162,39,.18)!important;
    border-color:var(--accent)!important;
    color:var(--accent2)!important;
    box-shadow:0 0 0 2px rgba(201,162,39,.15);
  }

  /* Custom themed checkbox (used e.g. for the "send reset email" option) */
  .ft-check{
    appearance:none;-webkit-appearance:none;
    width:18px;height:18px;flex-shrink:0;
    border-radius:6px;border:1.5px solid var(--border);
    background:var(--surface2);cursor:pointer;
    position:relative;transition:all .18s ease;
  }
  .ft-check:hover{border-color:var(--accent);box-shadow:0 0 0 4px rgba(201,162,39,.1)}
  .ft-check:checked{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    border-color:var(--accent2);
    box-shadow:0 2px 8px rgba(201,162,39,.35);
  }
  .ft-check:checked::after{
    content:'';position:absolute;left:5.5px;top:2px;
    width:5px;height:9px;
    border:solid #1a1404;border-width:0 2px 2px 0;
    transform:rotate(45deg) scale(1);
    animation:ft-check-pop .18s ease;
  }
  @keyframes ft-check-pop{from{transform:rotate(45deg) scale(0)}to{transform:rotate(45deg) scale(1)}}
  .ft-check:focus-visible{box-shadow:0 0 0 3px rgba(201,162,39,.22)}

  /* Pending-requests row, badge counter & approval panel */
  .pending-count{
    display:inline-flex;align-items:center;gap:.4rem;
    margin-left:auto;padding:3px 10px;border-radius:20px;
    background:rgba(201,162,39,.14);border:1px solid rgba(201,162,39,.3);
    font-size:10.5px;font-weight:700;color:var(--accent2);
    text-transform:none;letter-spacing:.2px;
  }
  .pending-count::before{
    content:'';width:6px;height:6px;border-radius:50%;
    background:var(--accent2);box-shadow:0 0 0 3px rgba(201,162,39,.22);
  }
  .pending-row{
    padding:1rem 1.1rem;border-bottom:1px solid rgba(30,38,64,.2);
    display:flex;flex-direction:column;gap:.7rem;
    transition:background .2s ease;
  }
  .pending-row:last-child{border-bottom:none}
  .pending-row:hover{background:rgba(255,255,255,.015)}
  .pending-avatar{
    width:38px;height:38px;border-radius:50%;flex-shrink:0;overflow:hidden;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:700;color:#fff;
    box-shadow:0 2px 10px rgba(201,162,39,.25);
  }
  .pending-action-btn{
    padding:6px 13px;border-radius:9px;font-size:11.5px;font-weight:700;
    cursor:pointer;border:1.5px solid transparent;
    letter-spacing:.2px;transition:all .15s ease;
  }
  .pending-approve-btn{background:var(--accent);color:#fff;box-shadow:0 2px 10px rgba(201,162,39,.3)}
  .pending-approve-btn:hover{background:var(--accent2)}
  .pending-approve-btn.is-active{background:var(--surface2);color:var(--text);border-color:var(--border);box-shadow:none}
  .pending-approve-btn.is-active:hover{border-color:var(--accent);color:var(--accent2)}
  .pending-reject-btn{background:transparent;color:var(--red);border-color:rgba(192,57,43,.35)}
  .pending-reject-btn:hover{background:rgba(192,57,43,.1);border-color:var(--red)}

  /* AUTH */
  .auth-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
  .auth-box{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:2.5rem;width:100%;max-width:400px;box-shadow:var(--shadow-md)}
  .logo{font-size:26px;font-weight:700;letter-spacing:-1px;margin-bottom:4px}
  .logo span{color:var(--accent)}
  .auth-sub{color:var(--muted);font-size:13px;margin-bottom:2rem}
  .auth-tabs{display:flex;gap:8px;margin-bottom:1.5rem}
  .tab-btn{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-weight:500;transition:.2s}
  .tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .field{margin-bottom:1rem}
  .pw-wrap{position:relative;display:flex;align-items:center}
  .pw-wrap input{flex:1;padding-right:38px}
  .pw-eye{position:absolute;right:10px;background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;line-height:1;font-size:16px;user-select:none}
  .pw-eye:hover{color:var(--text)}
  .pw-wrap input::-ms-reveal,.pw-wrap input::-ms-clear{display:none}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
  .btn-primary{width:100%;padding:11px;border-radius:8px;background:var(--accent);color:#fff;font-weight:600;font-size:14px;margin-top:.5rem;transition:.15s}
  .btn-primary:hover{background:#a8841e}
  @keyframes ft-spin{to{transform:rotate(360deg)}}
  @keyframes ft-pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .err{color:var(--red);font-size:12px;margin-top:.5rem}
  .ok-msg{color:var(--green);font-size:12px;margin-top:.5rem}
  /* Email field with fixed domain */
  .email-wrap{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border .2s,box-shadow .2s}
  .email-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(201,162,39,0.13)}
  .email-wrap input{background:transparent;border:none;border-radius:0;padding:10px 0 10px 14px;flex:1;min-width:0;outline:none;box-shadow:none!important}
  .email-wrap input:focus{border:none;box-shadow:none}
  .email-suffix{flex-shrink:0;padding:10px 14px 10px 2px;font-size:13px;color:var(--accent2);font-weight:600;white-space:nowrap;user-select:none;-webkit-user-select:none;pointer-events:none}

  /* APP LAYOUT */
  .app{display:flex;height:100vh;overflow:hidden}

  /* ── SIDEBAR EXPANDED ── */
  /* ── SIDEBAR ── */
  .sidebar{
    width:224px;background:var(--surface);border-right:1px solid var(--border);
    display:flex;flex-direction:column;flex-shrink:0;position:relative;
    height:100%;
    transition:width .3s cubic-bezier(.4,0,.2,1);overflow:hidden
  }
  .sidebar.collapsed{width:64px;cursor:pointer}

  /* inner is always 224px wide — sidebar clips it via overflow:hidden */
  .sidebar-inner{
    width:224px;flex-shrink:0;
    display:flex;flex-direction:column;height:100%;
    padding:1rem .75rem;gap:2px;
  }

  /* ── Logo row (holds logo + toggle inline) ── */
  .sidebar-logo{
    display:flex;align-items:center;gap:8px;
    padding:.3rem .25rem;margin-bottom:.75rem;
    min-height:38px;flex-shrink:0;overflow:hidden;
  }
  .sidebar-logo .logo-icon{
    width:30px;height:30px;flex-shrink:0;
    background:rgba(201,162,39,0.13);border:1.5px solid rgba(201,162,39,0.33);
    border-radius:9px;display:flex;align-items:center;justify-content:center
  }
  .sidebar-logo .logo-icon svg{width:16px;height:16px;color:var(--accent)}
  .sidebar-logo .logo-text{
    flex:1;font-size:18px;font-weight:700;letter-spacing:-.5px;white-space:nowrap;
    overflow:hidden;transition:opacity .2s ease;
  }
  .sidebar-logo .logo-text span{color:var(--accent)}
  .sidebar.collapsed .logo-text{opacity:0;pointer-events:none}

  /* ── Toggle button — inline flex item, never overlaps ── */
  .sidebar-toggle{
    width:26px;height:26px;border-radius:8px;padding:0;flex-shrink:0;
    background:var(--surface2);border:1px solid var(--border);
    color:var(--muted);display:flex;align-items:center;justify-content:center;
    cursor:pointer;z-index:1;
    transition:background .15s,color .15s,border-color .15s
  }
  .sidebar-toggle svg{
    width:13px;height:13px;
    transition:transform .3s cubic-bezier(.4,0,.2,1)
  }
  .sidebar-toggle:hover{background:var(--border);color:var(--text);border-color:var(--muted)}
  .sidebar.collapsed .sidebar-toggle svg{transform:rotate(180deg)}

  /* ── Nav items ── */
  .nav-item{
    display:flex;align-items:center;gap:10px;
    padding:9px 10px;border-radius:10px;margin-bottom:1px;
    color:var(--muted);cursor:pointer;
    font-size:13.5px;font-weight:500;white-space:nowrap;
    position:relative;
    transition:background .15s,color .15s
  }
  .nav-item:hover{background:var(--surface2);color:var(--text)}
  .nav-item.active{background:rgba(201,162,39,0.1);color:var(--accent2)}
  .nav-item.active::before{
    content:'';position:absolute;left:0;top:20%;bottom:20%;
    width:3px;border-radius:0 3px 3px 0;background:var(--accent2)
  }
  .nav-item svg{width:18px;height:18px;flex-shrink:0}
  .nav-item .nav-label{overflow:hidden;transition:opacity .15s ease}
  .sidebar.collapsed .nav-label{opacity:0;pointer-events:none}

  /* tooltip on collapsed hover */
  .sidebar.collapsed .nav-item:hover::after{
    content:attr(data-label);
    position:absolute;left:calc(100% + 8px);top:50%;transform:translateY(-50%);
    background:var(--surface2);border:1px solid var(--border);
    color:var(--text);font-size:12px;font-weight:500;
    padding:5px 11px;border-radius:8px;
    white-space:nowrap;z-index:999;pointer-events:none;
    box-shadow:0 6px 18px rgba(0,0,0,.45)
  }

  /* ── Bottom user area ── */
  .sidebar-bottom{
    margin-top:auto;padding-top:.5rem;
    border-top:1px solid rgba(255,255,255,.06);
    flex-shrink:0;
  }
  .user-pill{
    display:flex;align-items:center;gap:10px;
    padding:8px 10px;border-radius:12px;cursor:default;
    transition:background .15s;position:relative;
    margin:0 2px;
  }
  .user-pill:hover{background:var(--surface2)}
  /* collapsed: center just the avatar */
  .sidebar.collapsed .user-pill{
    justify-content:center;padding:8px 0;margin:0;
  }
  .sidebar.collapsed .user-pill:hover{background:transparent}
  .sidebar.collapsed .user-pill:hover .avatar{box-shadow:0 0 0 8px var(--surface2),0 4px 14px rgba(109,40,217,.35)}
  .avatar{
    width:36px;height:36px;border-radius:10px;flex-shrink:0;
    background:linear-gradient(135deg,var(--accent) 0%,#f0c84a 100%);

<script>
// ============================================================
// SECTION 3 — IN-MEMORY DATA STORE
// This app has NO database. All state lives in two JS arrays:
//
//   users[]  — every registered account.
//              Fields: id, name, email, password, role
//              ('admin'|'user'), title ('Lawyer'|'Staff'|…),
//              avatar (base64 data-URL or null),
//              banner (base64 data-URL or null),
//              abbrev (lawyer abbreviation string).
//
//   files[]  — every physical case folder registered.
//              Fields: id (Case Folder No.), name (case title),
//              category, location, status ('available'|'borrowed'),
//              borrower, borrowerEmail, borrowDate,
//              notes, caseType, caseNo, court, caseNature,
//              driveLink, borrowHistory[].
//

// Runs once immediately at page load (IIFE).

// renames their account, those history entries would show the
// stale name forever.
// Solution: Walk every file's borrowHistory and, for any entry

// backfill the email so future renames propagate correctly.
// Also backfills the active borrow's borrowerEmail if missing.
// ============================================================
// Backfill borrowerEmail into seed borrowHistory entries so renames don't break history
(function backfillBorrowEmails(){
  files.forEach(f => {
    (f.borrowHistory||[]).forEach(h => {
      if(!h.borrowerEmail && h.borrower){
        const u = users.find(u => u.name === h.borrower);
        if(u) h.borrowerEmail = u.email;
      }
    });

    if(f.borrower && !f.borrowerEmail){
      const u = users.find(u => u.name === f.borrower);
      if(u) f.borrowerEmail = u.email;
    }
  });
})();

let _ftFirstUsersSnapshot = true;
let _ftFirstFilesSnapshot = true;
let _ftFirstRejectedSnapshot = true;
let _ftDataSyncStarted = false;
let _ftUnsubUsers = null;
let _ftUnsubFiles = null;
let _ftUnsubRejectedUsers = null;

// Live sync: starts the moment someone is signed in (never before — the
// rules require isSignedIn() for any read, so subscribing earlier than
// this always fails with "Missing or insufficient permissions").
// Safe to call more than once; only wires the listeners on the first call.
function startDataSync(){
  if(_ftDataSyncStarted) return;
  _ftDataSyncStarted = true;

  _ftUnsubUsers = usersCol.onSnapshot(snap=>{
    const liveUsers = snap.docs.map(d=>d.data());
    if(liveUsers.length){
      users.length = 0;
      liveUsers.forEach(u=>users.push(u));
      if(currentUser){
        const fresh = users.find(u=>u.id===currentUser.id);
        if(fresh) currentUser = fresh;
      }
    }
    if(!_ftFirstUsersSnapshot && typeof render==='function') render();
    _ftFirstUsersSnapshot = false;
  }, e=>console.error('users onSnapshot error:', e));

  // rejectedUsers is admin-only per the security rules — subscribing for
  // a non-admin (pending/lawyer/staff) session would just throw a
  // permission-denied error on every sign-in, so only admins listen here.
  if(currentUser && currentUser.role==='admin'){
    _ftUnsubRejectedUsers = rejectedUsersCol.onSnapshot(snap=>{
      rejectedUsers.length = 0;
      snap.docs.forEach(d=>rejectedUsers.push(d.data()));
      if(!_ftFirstRejectedSnapshot && typeof render==='function') render();
      _ftFirstRejectedSnapshot = false;
    }, e=>console.error('rejectedUsers onSnapshot error:', e));
  }

  _ftUnsubFiles = filesCol.onSnapshot(snap=>{
    const liveFiles = snap.docs.map(d=>d.data());
    if(liveFiles.length){
      files.length = 0;
      liveFiles.forEach(f=>files.push(f));
      if(selectedFile){
        const fresh = files.find(f=>f.id===selectedFile.id);
        if(fresh) selectedFile = fresh;
      }
    }
    if(!_ftFirstFilesSnapshot && typeof render==='function') render();
    _ftFirstFilesSnapshot = false;
  }, e=>console.error('files onSnapshot error:', e));
}

// Stops the listeners on logout (no signed-in user => no read permission anyway).
function stopDataSync(){
  if(_ftUnsubUsers){_ftUnsubUsers();_ftUnsubUsers=null;}
  if(_ftUnsubFiles){_ftUnsubFiles();_ftUnsubFiles=null;}
  if(_ftUnsubRejectedUsers){_ftUnsubRejectedUsers();_ftUnsubRejectedUsers=null;}
  _ftDataSyncStarted=false;
  _ftFirstUsersSnapshot=true;
  _ftFirstFilesSnapshot=true;
  _ftFirstRejectedSnapshot=true;
}

// One-time, ADMIN-ONLY seeding of the 'files' collection. Only runs once
// someone with an admin profile is actually signed in (matches the rule
// "allow create: if isAdmin()" on /files/{fileId}). On a brand-new
// database, log in as admin once to trigger this.
function seedFilesIfEmptyAsAdmin(){
  if(!currentUser || currentUser.role!=='admin') return;
  filesCol.limit(1).get().then(snap=>{
    if(snap.empty){
      const batch = db.batch();
      files.forEach(f=>batch.set(filesCol.doc(String(f.id)), JSON.parse(JSON.stringify(f))));
      return batch.commit();
    }
  }).catch(e=>console.error('File seeding failed:', e));
}

// Creates the 4 demo accounts (Auth + Firestore profile) the very first
// time this app is ever pointed at a fresh database. This can't run
// automatically anymore: the strict rules require an admin to already
// exist before anyone can write a user profile, so the very first admin

//        rules_version='2';
//        service cloud.firestore {
//          match /databases/{database}/documents {
//            match /{document=**} { allow read, write: if true; }
//          }
//        }
//   2. Open this page, open the browser console, and run:
//        seedDemoUsers()
//   3. Confirm in the console it logs "Seeding complete."
//   4. Re-publish the real firestore.rules from the project.
//   5. Refresh this page and log in normally.
async function seedDemoUsers(){
  for(const seedUser of users){
    try{
      const cred = await auth.createUserWithEmailAndPassword(seedUser.email, seedUser.password);
      const uid = cred.user.uid;
      const profile = {...seedUser, id: uid};
      delete profile.password;
      await usersCol.doc(uid).set(profile);
      await auth.signOut();
      console.log('Created', seedUser.email);
    }catch(e){
      console.error('Seeding account failed for', seedUser.email, e);
    }
  }
  console.log('Seeding complete.');
}
window.seedDemoUsers = seedDemoUsers;

// Restore session on page refresh if Firebase Auth already has a signed-in user,
// and (re)start the live listeners whenever a session exists.
auth.onAuthStateChanged(fbUser=>{
  if(fbUser){
    if(_ftRegisterInFlight){
      // doRegister()'s ghost-account fallback is already handling this
      // exact sign-in itself (with the correct "doc missing -> pending"
      // logic) — stepping in here too would race it and risk reading a
      // stale/cached doc for an account that was just deleted.
      return;
    }
    if(!currentUser){
      usersCol.doc(fbUser.uid).get().then(doc=>{
        if(doc.exists){
          currentUser=doc.data();
          startDataSync();
          seedFilesIfEmptyAsAdmin();
          render();
        }
      }).catch(e=>console.error('Session restore failed:', e));
    } else {
      startDataSync();
      seedFilesIfEmptyAsAdmin();
    }
  } else {
    stopDataSync();
  }
});

function sortedFiles(arr){
  if(!sortCol)return arr;
  return [...arr].sort((a,b)=>{
    let av='',bv='';
    if(sortCol==='id'){av=a.id;bv=b.id;}
    else if(sortCol==='name'){av=a.name||'';bv=b.name||'';}
    else if(sortCol==='borrower'){av=a.borrower||'';bv=b.borrower||'';}
    else if(sortCol==='borrowDate'){av=a.borrowDate||'';bv=b.borrowDate||'';}
    const cmp=av.localeCompare(bv,undefined,{numeric:true});
    return sortDir==='asc'?cmp:-cmp;
  });
}

      &&(!cs.court||(f.court||'').toLowerCase().includes(cs.court.toLowerCase()))
      &&(!cs.borrower||((f.borrower||'').toLowerCase().includes(cs.borrower.toLowerCase())));
    const mMine=!filterMyBorrowed||(f.status==='borrowed'&&currentUser&&(f.borrowerEmail===currentUser.email||((f.borrowHistory&&f.borrowHistory.length?f.borrowHistory[f.borrowHistory.length-1]:null)||{}).borrowForEmail===currentUser.email));
    return mQ&&mS&&mC&&mCol&&mMine;
  });
}

// ============================================================
// SECTION 10 — ROOT RENDER ENGINE
// render() is the single re-paint entry point for the entire
// app — called after EVERY state change.
//
// Flow:
//   1. If a QR scan page is active (scanFileId != null),
//      paint the scan landing page and wire its events.
//   2. If no user is logged in, paint the auth screen.
//   3. Otherwise, paint the main app shell.
//
// Focus preservation: before overwriting innerHTML, the
// currently focused element's id and cursor position are
// captured and restored after painting, so typing in an
// input field is not interrupted by live re-renders.
// ============================================================
// ── Root render ────────────────────────────────────────────────────────
function render(){
  
  const root=document.getElementById('root');
  const activeEl=document.activeElement;
  const focusId=activeEl&&activeEl.id||null;
  const focusSel=(activeEl&&activeEl.selectionStart!=null)?activeEl.selectionStart:null;
  if(resetOobCode){root.innerHTML=renderResetPasswordScreen();attachResetPasswordScreen();return}
  if(scanFileId!==null){root.innerHTML=renderScanPage();attachScan();return}
  if(!currentUser){root.innerHTML=renderAuth();attachAuth();return}
  if(currentUser.role==='pending'){root.innerHTML=renderPendingScreen();return}
  root.innerHTML=renderApp();
  attachApp();
  attachAccountPage();
  // Sync theme icon
  const _ti=document.getElementById('theme-icon');
  if(_ti&&document.documentElement.classList.contains('light')){
    _ti.innerHTML='<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  }
  if(focusId){
    const el=document.getElementById(focusId);
    if(el){el.focus();if(focusSel!=null&&el.setSelectionRange)el.setSelectionRange(focusSel,focusSel);}
  }
}

function attachResetPasswordScreen(){
  if(resetState!=='ready') return;
  const confEl=document.getElementById('rp-conf');
  if(confEl) confEl.onkeydown=e=>{ if(e.key==='Enter') submitNewPassword(); };
}

function submitNewPassword(){
  const pEl=document.getElementById('rp-pass');
  const cEl=document.getElementById('rp-conf');
  const err=document.getElementById('rp-err');
  if(!pEl||!cEl||!err) return;
  const p=pEl.value, c=cEl.value;
  err.textContent='';
  if(!p||!c){err.textContent='Please fill in both fields.';return}
  if(p.length<6){err.textContent='Password min 6 chars.';return}
  if(p!==c){err.textContent='Passwords do not match.';return}
  auth.confirmPasswordReset(resetOobCode, p).then(()=>{
    resetState='success';
    render();
  }).catch(e=>{
    console.error('confirmPasswordReset failed:', e);
    if(e.code==='auth/expired-action-code'||e.code==='auth/invalid-action-code'){
      resetState='invalid';
      render();
    } else {
      err.textContent=e.message||'Could not update password.';
    }
  });
}

    window.history.replaceState(null, '', window.location.pathname);
  }

}

// Checks the URL once on page load for a Firebase password-reset link
// (?mode=resetPassword&oobCode=...) and, if present, verifies the code and
// switches render() into the reset-password screen for the rest of this
// page load.
function checkForPasswordResetLink(){
  const params=new URLSearchParams(window.location.search);
  if(params.get('mode')!=='resetPassword') return;
  const code=params.get('oobCode');
  if(!code) return;
  resetOobCode=code;
  resetState='verifying';
  auth.verifyPasswordResetCode(code).then(email=>{
    resetEmail=email;
    resetState='ready';
    render();
  }).catch(e=>{
    console.error('verifyPasswordResetCode failed:', e);
    resetState='invalid';
    render();
  });
}

  const btn=document.querySelector('.btn-primary');
  const resetBtn=()=>{ if(btn){btn.disabled=false;btn.textContent='Create Account';} };
  if(btn){btn.disabled=true;btn.innerHTML=`<span style="display:inline-flex;align-items:center;gap:8px"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="animation:ft-spin .7s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>Creating account…</span>`;}

  _ftRegisterInFlight=true;
  auth.createUserWithEmailAndPassword(e,p).then(cred=>{
    const uid=cred.user.uid;
    // New self-registrations land as 'pending' — they get an Auth
    // account + Firestore profile right away, but can't use the app
    // until an admin approves them (see render()'s pending-gate branch
    // and adminUserList's "Pending Requests" section).
    const profile={id:uid,name:n,email:e,role:'pending',title:'Pending',avatar:null};
    return usersCol.doc(uid).set(profile).then(()=>profile);
  }).then(profile=>{
    _ftRegisterInFlight=false;
    currentUser=profile;
    startDataSync();
    showLoginLoader();
    render();
    setTimeout(hideLoginLoader, 600);
  }).catch(error=>{
    if(error.code==='auth/email-already-in-use'){
      // Could be a genuinely taken email, OR a "ghost" account left
      // behind by a past rejection/deletion (Auth account survives
      // those — only the Firestore profile gets removed). Try signing
      // in with what they just typed: if it's really their own old
      // account, this succeeds and we just rebuild a fresh pending
      // profile for them, no admin step required. If it's someone
      // else's email, the password won't match and this fails, in
      // which case we fall back to the normal "already registered".
      auth.signInWithEmailAndPassword(e,p).then(cred=>{
        const uid=cred.user.uid;
        // Force a server read, not a cached one — the whole point of
        // this check is to catch a just-deleted profile, and a stale
        // local cache could still show the old (pre-delete) document.
        return usersCol.doc(uid).get({source:'server'}).then(doc=>{
          if(doc.exists){
            // A real, still-active profile exists under this uid —
            // genuinely someone else's account (or already pending/
            // approved) — sign back out and show the normal error.
            _ftRegisterInFlight=false;
            resetBtn();
            auth.signOut();
            err.textContent='Email already registered.';
            return;
          }
          const profile={id:uid,name:n,email:e,role:'pending',title:'Pending',avatar:null};
          // Clean up the leftover rejectedUsers archive entry (if any) in
          // the same atomic write — this is the account being given a
          // fresh start, so it shouldn't still show up as "rejected"
          // once it's pending again.
          const batch=db.batch();
          batch.set(usersCol.doc(uid), profile);
          batch.delete(rejectedUsersCol.doc(uid));
          return batch.commit().then(()=>{
            _ftRegisterInFlight=false;
            currentUser=profile;
            const ridx=rejectedUsers.findIndex(r=>r.id===uid);
            if(ridx>-1) rejectedUsers.splice(ridx,1);
            startDataSync();
            showLoginLoader();
            render();
            setTimeout(hideLoginLoader, 600);
          });
        });
      }).catch(()=>{
        _ftRegisterInFlight=false;
        resetBtn();
        err.textContent='Email already registered.';
      });
    }
    else if(error.code==='auth/weak-password'){ _ftRegisterInFlight=false; resetBtn(); err.textContent='Password min 6 chars.'; }
    else { _ftRegisterInFlight=false; resetBtn(); err.textContent=error.message; }
  });
}
function attachAuth(){
  // Login: email→password→submit
  const lEmail=document.getElementById('l-email');
  const lPass=document.getElementById('l-pass');
  if(lEmail) lEmail.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();lPass&&lPass.focus();}});
  if(lPass) lPass.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
  // Register: name→email→password→confirm→submit
  const rName=document.getElementById('r-name');
  const rEmail=document.getElementById('r-email');
  const rPass=document.getElementById('r-pass');
  const rConf=document.getElementById('r-conf');
  if(rName) rName.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();rEmail&&rEmail.focus();}});
  if(rEmail) rEmail.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();rPass&&rPass.focus();}});
  if(rPass) rPass.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();rConf&&rConf.focus();}});
  if(rConf) rConf.addEventListener('keydown',e=>{if(e.key==='Enter')doRegister();});
}

let _confirmingScan = false;
function confirmScan(){
  if(_confirmingScan) return; _confirmingScan=true;
  const pass=document.getElementById('pw-pass').value||'';
  const cred=firebase.auth.EmailAuthProvider.credential(currentUser.email, pass);
  auth.currentUser.reauthenticateWithCredential(cred).then(()=>{
    runScanAction();
  }).catch(()=>{
    scanMsg={type:'err',text:'Incorrect password. Try again.'};
    setScanAction(scanAction); // also resets _confirmingScan
  });
}
function runScanAction(){
  const u=currentUser;

  const f=files.find(f=>f.id===scanFileId);

  if(scanAction==='borrow'){
    if(f.status!=='available'){scanMsg={type:'err',text:'This folder is no longer available.'};setScanAction(scanAction);return}
    f.status='borrowed';f.borrower=u.name;f.borrowerEmail=u.email;f.borrowDate=todayStr();
    if(!f.borrowHistory)f.borrowHistory=[];
    const _bfe = staffBorrowForEmail; staffBorrowForEmail=''; // capture & clear immediately
    const borrowForUser = _bfe ? users.find(u2=>u2.email===_bfe) : null;
    // Guard: only push if there is no open (unreturned) entry already
    const _lastH = f.borrowHistory[f.borrowHistory.length-1];
    if(!_lastH || _lastH.returnedOn !== null){
      f.borrowHistory.push({borrower:u.name,borrowerEmail:u.email,borrowedOn:todayStr(),returnedOn:null,borrowFor:borrowForUser?borrowForUser.name:null,borrowForEmail:_bfe||null});
    }
    syncFileToDb(f);
  } else {
    if(f.status==='available'){scanMsg={type:'err',text:'This folder is already available.'};setScanAction(scanAction);return}
    const _lhR=f.borrowHistory&&f.borrowHistory.length?f.borrowHistory[f.borrowHistory.length-1]:null;
    const _isBorrowForLawyer=_lhR&&_lhR.borrowForEmail&&u.email===_lhR.borrowForEmail;
    if(u.role!=='admin'&&f.borrowerEmail&&u.email!==f.borrowerEmail&&!_isBorrowForLawyer){
      scanMsg={type:'err',text:'Only '+(_lhR&&_lhR.borrowFor?lawyerAbbrev(_lhR.borrowFor)+' or '+borrowerDisplay(f.borrower,f.borrowerEmail):borrowerDisplay(f.borrower,f.borrowerEmail))+', or an admin can return this folder.'};
      setScanAction(scanAction);return;
    }
    if(!f.borrowHistory)f.borrowHistory=[];
    const lastEntry=f.borrowHistory[f.borrowHistory.length-1];
    if(lastEntry && lastEntry.returnedOn===null){
      lastEntry.returnedOn=todayStr();
    } else {
      // No matching open entry — create one now (covers seed data with empty borrowHistory)
      f.borrowHistory.push({
        borrower: f.borrower,
        borrowerEmail: f.borrowerEmail,
        borrowedOn: f.borrowDate||todayStr(),
        returnedOn: todayStr()
      });
    }
    f.status='available';f.borrower=null;f.borrowerEmail=null;f.borrowDate=null;
    syncFileToDb(f);
  }

  scanDoneAction=scanAction;
  scanDone=true;
  scanAction=null;
  _confirmingScan=false;
  render();
}

// DASHBOARD
function renderDashboard(){

  // Reset "Load More" pagination back to the first page whenever the

  const _filterSig = JSON.stringify([filterSearch,filterStatus,filterCategory,filterMyBorrowed,colSearch,sortCol,sortDir]);

    folderShowCount = FOLDER_PAGE_SIZE;

  const hasMore = fs.length > folderShowCount;

  const statusDot=filterStatus!=='all'?`<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${curStatus.color};margin-right:5px;flex-shrink:0"></span>`:'';

  return`

    <!-- Advanced Filters panel (collapsible) -->
    ${searchModalOpen?`
    <div style="padding:.75rem 1.1rem;background:var(--surface2);border-bottom:1px solid var(--border)">

        </div>
        <div>
          <div style="font-size:10px;color:var(--muted);margin-bottom:3px;font-weight:600">Borrower</div>
          <input id="cs-borrower" placeholder="e.g. Maria Santos…" value="${esc(colSearch.borrower)}" oninput="colSearch.borrower=this.value;render()" style="width:100%;font-size:11.5px;padding:5px 9px;border-radius:8px;background:var(--bg);border:1px solid ${colSearch.borrower?'var(--accent)':'var(--border)'};color:var(--text);outline:none;box-sizing:border-box;transition:.15s"/>
        </div>
      </div>
    </div>`:''}

    ${fs.length===0?`<div class="empty" style="padding:3rem;text-align:center"><div class="empty-icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--muted);opacity:.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></div><div style="color:var(--muted);margin-top:.5rem">No folders match your filters</div>${hasCS?`<button onclick="clearColSearch();render()" style="margin-top:.75rem;padding:5px 16px;border-radius:20px;font-size:12px;font-weight:600;background:rgba(201,162,39,.12);color:var(--accent2);border:1px solid var(--accent);cursor:pointer">Clear Filters</button>`:''}
</div>`:
    `<table>
      <thead>
        <tr>
          <th style="width:28px"></th>
          <th style="width:130px;cursor:pointer;user-select:none" onclick="toggleSort('id')">CASE FOLDER NO. ${sortCol==='id'?(sortDir==='asc'?'↑':'↓'):''}</th>
          <th style="width:130px">CASE TYPE</th>
          <th style="cursor:pointer;user-select:none" onclick="toggleSort('name')">CASE TITLE ${sortCol==='name'?(sortDir==='asc'?'↑':'↓'):''}</th>
          <th style="width:200px">CASE NO.</th>
          <th style="width:220px">COURT</th>
          <th style="width:120px;cursor:pointer;user-select:none" onclick="toggleSort('borrower')">BORROWER ${sortCol==='borrower'?(sortDir==='asc'?'↑':'↓'):''}</th>
          <th style="width:110px;cursor:pointer;user-select:none" onclick="toggleSort('borrowDate')">BORROWED ON ${sortCol==='borrowDate'?(sortDir==='asc'?'↑':'↓'):''}</th>
          <th style="width:110px">STATUS</th>
        </tr>
      </thead>
      <tbody>${fsVisible.map(f=>{
        const activeBorrow=f.borrower;
        const _lhT=f.borrowHistory&&f.borrowHistory.length?f.borrowHistory[f.borrowHistory.length-1]:null;
        const _activeBorrowerName=_lhT&&_lhT.borrowFor&&!_lhT.returnedOn
          ?esc(lawyerAbbrev(_lhT.borrowFor))
          :esc(borrowerDisplay(f.borrower, f.borrowerEmail));
        const _staffLine=_lhT&&_lhT.borrowFor&&!_lhT.returnedOn
          ?`<div style="font-size:10px;color:var(--muted);font-weight:500;margin-top:1px">via ${esc(borrowerDisplay(f.borrower, f.borrowerEmail))}</div>`:'';
        const borrowerCell=activeBorrow
          ?`<td style="font-size:12.5px;color:var(--text);font-weight:500">${_activeBorrowerName}${_staffLine}</td>
             <td style="font-size:12px;color:var(--text)">${f.borrowDate?formatDate(f.borrowDate):'—'}</td>
             <td style="font-size:12px;color:var(--amber);font-weight:600">Active</td>`
          :`<td colspan="3" style="text-align:center"><span style="font-size:11.5px;font-weight:600;color:var(--green);background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);padding:3px 14px;border-radius:20px;letter-spacing:.3px">Available</span></td>`;
        return`
        <tr class="folder-row" data-id="${esc(f.id)}" onclick="openDetail('${esc(f.id)}')" oncontextmenu="openCtxMenu(event,'${esc(f.id)}')" style="cursor:pointer">
          <td style="text-align:center;padding:14px 8px">
            <span class="status-dot-sm ${f.status}" title="${f.status.charAt(0).toUpperCase()+f.status.slice(1)}"></span>
          </td>
          <td><code style="display:inline-block;font-size:11px;color:var(--accent2);font-weight:700;background:var(--surface2);padding:3px 8px;border-radius:6px;border:1px solid rgba(30,38,64,0.27);letter-spacing:.3px;line-height:1.45;word-break:break-word;max-width:100%">${esc(f.id)}</code></td>

            <div style="font-weight:600;font-size:13px;color:var(--text);line-height:1.35;margin-bottom:2px">${esc(f.name)}</div>
            <div style="font-size:11px;color:var(--muted)">${esc(f.location)}</div>
          </td>
          <td style="font-size:12px;line-height:1.4;color:var(--text)">${f.caseNo?esc(f.caseNo)+'<div style="font-size:11px;color:var(--muted);margin-top:2px">'+(f.caseNature?esc(f.caseNature):'')+'</div>':'<span style="color:var(--muted)">—</span>'}</td>
          <td style="font-size:12px;color:var(--text);line-height:1.4">${f.court?esc(f.court):'<span style="color:var(--muted)">—</span>'}</td>
          ${borrowerCell}
        </tr>`;
      }).join('')}
      </tbody>

    ${hasMore?`
    <div style="display:flex;flex-direction:column;align-items:center;gap:.5rem;padding:1.1rem 0">
      <button onclick="folderShowCount+=FOLDER_PAGE_SIZE;render()" style="padding:8px 22px;border-radius:10px;font-size:12.5px;font-weight:600;background:var(--surface2);border:1px solid var(--border);color:var(--text);cursor:pointer;transition:all .15s" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">Load More</button>
      <div style="font-size:11px;color:var(--muted)">Showing ${fsVisible.length} of ${fs.length} folders</div>
    </div>`:''}`}
  </div>
</div>`;
}

// SECTION 15 — FOLDER LOOKUP PAGE
// A minimal search-by-ID page. User types a Case Folder No.
// (e.g. "FT-001") and clicks Open.
//
//   renderLookupPage() — renders the input + a help note
//                        explaining how QR codes work in prod.
//   doLookup()         — finds the file by ID (case-insensitive),
//                        shows an error if not found, or calls
//                        openScan(id) to navigate to its scan page.
// ============================================================
// LOOKUP PAGE
function renderLookupPage(){
  return`
<div style="max-width:480px">
  <div class="page-title">Folder Lookup</div>
  <div class="page-sub">Enter a Case Folder No. to open its scan page</div>
  <div class="table-wrap" style="padding:1.5rem">
    <div style="display:flex;gap:.75rem">
      <div style="position:relative;flex:1">
        <input id="lu-input" placeholder="e.g. FT-001" style="width:100%;box-sizing:border-box"
          oninput="luAcUpdate()" onkeydown="luAcKey(event)" autocomplete="off"/>
        <div id="lu-ac-list" style="display:none;position:absolute;top:100%;left:0;right:0;z-index:200;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-top:4px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.3)"></div>
      </div>
      <button class="btn-sm" onclick="doLookup()">Open</button>
    </div>
    <div id="lu-err" style="margin-top:.5rem"></div>
  </div>
  <div style="margin-top:1.5rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;font-size:13px;color:var(--muted)">
    <strong style="display:block;margin-bottom:.5rem;color:var(--text)">In production</strong>
    Each printed QR code links to <code>yourdomain.com/scan?id=FT-001</code>. Scanning it with a phone opens this same folder scan page directly — no dashboard login needed to check availability or borrow/return.
  </div>
</div>`;
}
function doLookup(){
  const val=document.getElementById('lu-input').value.trim();
  const f=files.find(f=>f.id.toUpperCase()===val.toUpperCase());
  if(!f){document.getElementById('lu-err').innerHTML=`<span style="color:var(--red);font-size:12px">No folder found with ID "${esc(val)}"</span>`;return}
  openScan(f.id);
}

// ============================================================
// SECTION 16 — MODAL SYSTEM
// All modals are rendered inside the .main area via the
// modal state variable and renderModal() dispatcher.
//
//   renderStaffBorrowModal() — staff "Borrow on Behalf Of" modal:
//                   shows a radio list of all Lawyer accounts;
//                   staff must select one before proceeding to
//                   the borrow scan page.
//   renderModal()   — dispatcher: delegates to the correct
//                   render function based on modal variable.
//   renderAddModal()— multi-field form for registering a new
//                   physical folder (admin only). After submit
//                   transitions to the "confirm" step which
//                   shows a QR preview.
//   makeQRImg(fid)  — uses the bundled QRCode library to
//                   generate an SVG QR for the given folder ID
//                   encoded as a base64 <img> tag.
//   renderAddConfirm() — post-add confirmation with folder
//                   summary + QR preview + Print button.
//   renderDeleteModal() — confirmation prompt before deletion.
//   renderQRModal() — full-size QR display + print action.
// ============================================================
// MODALS
function renderStaffBorrowModal(){
  const fid = staffBorrowModal.fileId;
  const f = files.find(f=>f.id===fid);
  const lawyers = users.filter(u => u.title==='Lawyer');
  return`
  <div class="modal" style="max-width:420px;border-radius:24px">
    <div class="modal-title">Borrow on Behalf Of</div>
    <div class="modal-sub">You are borrowing <strong>${esc(f?f.name:fid)}</strong>. Select the lawyer who instructed you to get this folder.</div>
    <div style="margin-bottom:1rem">
      <label style="font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:8px">Lawyer <span style="color:var(--red)">*</span></label>
      <div style="display:flex;flex-direction:column;gap:6px">
        ${lawyers.length===0
          ? `<div style="font-size:13px;color:var(--muted);padding:.75rem;background:var(--surface2);border-radius:10px;text-align:center">No lawyer accounts found</div>`
          : lawyers.map(l=>`
        <label style="display:flex;align-items:center;gap:10px;padding:9px 13px;border-radius:11px;border:1px solid ${staffBorrowForEmail===l.email?'var(--accent)':'var(--border)'};background:${staffBorrowForEmail===l.email?'rgba(201,162,39,.08)':'var(--bg)'};cursor:pointer;transition:all .13s" onclick="staffBorrowForEmail='${l.email}';showStaffBorrowModalDOM()">
          <div style="width:28px;height:28px;border-radius:8px;flex-shrink:0;background:linear-gradient(135deg,var(--accent),#f0c84a);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff">${initials(l.name)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;color:var(--text)">${esc(l.name)} <span style="color:var(--accent);font-size:11.5px;font-weight:700;background:rgba(201,162,39,.13);border:1px solid rgba(201,162,39,.3);padding:1px 7px;border-radius:20px">${esc(lawyerAbbrev(l.name))}</span></div>
          </div>
          <div style="width:16px;height:16px;border-radius:50%;border:2px solid ${staffBorrowForEmail===l.email?'var(--accent)':'var(--border)'};flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .13s">
            ${staffBorrowForEmail===l.email?`<div style="width:8px;height:8px;border-radius:50%;background:var(--accent)"></div>`:''}
          </div>
        </label>`).join('')}
      </div>
      <div id="sbm-err" style="min-height:1rem;font-size:12px;color:var(--red);margin-top:6px"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="staffBorrowModal=null;removeStaffBorrowModalDOM()">Cancel</button>
      <button onclick="confirmStaffBorrowModal()" style="padding:9px 22px;border-radius:10px;background:var(--accent);color:#fff;font-weight:600;font-size:13px;border:none;cursor:pointer">Continue</button>
    </div>
  </div>`;
}
function confirmStaffBorrowModal(){
  if(!staffBorrowForEmail){
    const el=document.getElementById('sbm-err');
    if(el) el.textContent='Please select a lawyer to continue.';
    return;
  }
  const fid=staffBorrowModal.fileId;
  staffBorrowModal=null;
  removeStaffBorrowModalDOM();
  // Proceed to scan page; borrowFor will be picked up from staffBorrowForEmail
  scanFileId=fid;scanAction=null;scanMsg=null;scanDone=false;scanDoneAction=null;
  render();
}

function renderModal(){
  if(modal==='add')return renderAddModal();
  if(modal==='detail')return renderDetailModal();
  if(modal==='edit')return renderEditModal();
  if(modal==='qr')return renderQRModal();
  if(modal==='delete')return renderDeleteModal();
  return'';
}
function renderAddModal(){
  if(addStep==='confirm')return renderAddConfirm();
  return`

function makeQRImg(fid,size){
  try{
    const qr=new QRCode({content:`https://yourdomain.com/scan?id=${fid}`,width:size,height:size,color:'#000000',background:'#ffffff',ecl:'M',join:true,container:'svg-viewbox'});
    const svg=qr.svg();
    const b64=btoa(encodeURIComponent(svg).replace(/%([0-9A-F]{2})/g,(_,p1)=>String.fromCharCode(parseInt(p1,16))));
    return`<img src="data:image/svg+xml;base64,${b64}" width="${size}" height="${size}" style="display:block"/>`;
  }catch(e){return`<div style="color:var(--red);font-size:12px">QR error: ${e.message}</div>`;}
}

      <!-- COL 3: History + Status + Action -->
      <div style="width:320px;flex-shrink:0;display:flex;flex-direction:column;padding:1rem;gap:.6rem">

        <!-- Borrow History — grows to fill available space -->
        ${(()=>{
          const hist=[...(f.borrowHistory||[])].reverse();
          const _lastOpen=f.borrowHistory&&f.borrowHistory.length?f.borrowHistory[f.borrowHistory.length-1]:null;

          const activeEntry=f.borrower&&!_hasOpenHistoryEntry?{borrower:f.borrower,borrowedOn:f.borrowDate,returnedOn:null,active:true,borrowFor:null}:null;
          // Mark the existing open history entry as active so it gets the highlighted style

                    :`<span style="font-size:10.5px;font-weight:700;color:var(--amber);background:rgba(245,158,11,.13);border:1px solid rgba(245,158,11,.3);padding:2px 8px;border-radius:20px;letter-spacing:.2px">Not yet</span>`
                  }</td>
                </tr>`).join('')}
              </tbody>
            </table>
          </div>
          `:`<div style="flex:1;display:flex;align-items:center;justify-content:center;padding:1.5rem;font-size:12px;color:var(--muted);font-style:italic;opacity:.7">No borrow history yet</div>`}
        </div>`;
        })()}

        <!-- Status pill -->
        <div style="background:${statusBg};border:1px solid ${statusBorder};border-radius:12px;padding:10px 14px;text-align:center;flex-shrink:0">

        <!-- Action button -->

// ============================================================
// SECTION 18 — RIGHT-CLICK CONTEXT MENU
// Appears when the user right-clicks a table row.
//
//   openCtxMenu(e, fid) — builds a floating <div.ctx-menu> DOM
//                         node and appends it to <body>.
//                         Items shown depend on role + status:
//                           • Admin: Edit, Borrow/Return, Delete
//                           • Regular user: Borrow or Return only
//                           • Return is disabled if borrower is
//                             a different user.
//                         Clamps position to stay within viewport.
//   closeCtxMenu()      — removes the menu element from DOM.
//   document click/keydown — auto-closes on any click or Escape.
// ============================================================
// CONTEXT MENU (right-click)
let ctxFileId = null;
function openCtxMenu(e,fid){
  e.preventDefault();e.stopPropagation();
  closeCtxMenu();
  ctxFileId=fid;
  const f=files.find(f=>f.id===fid);
  const canBorrow=f.status==='available';
  const canReturn=f.status==='borrowed';
  const _lhMB=f.borrowHistory&&f.borrowHistory.length?f.borrowHistory[f.borrowHistory.length-1]:null;const isMyBorrow=canReturn&&currentUser&&(currentUser.role==='admin'||f.borrowerEmail===currentUser.email||(_lhMB&&_lhMB.borrowForEmail&&_lhMB.borrowForEmail===currentUser.email));
  const menu=document.createElement('div');
  menu.className='ctx-menu';menu.id='ctx-menu';
  menu.style.left=e.clientX+'px';menu.style.top=e.clientY+'px';
  // Borrow or Return button — shown conditionally, return disabled if not the borrower
  let borrowReturnBtn='';
  if(canBorrow){
    borrowReturnBtn=`<button class="ctx-item" onclick="openScan('${esc(fid)}')">${SVG.borrow} Borrow</button>`;
  } else if(canReturn){
    if(isMyBorrow){
      borrowReturnBtn=`<button class="ctx-item" onclick="openScan('${esc(fid)}')">${SVG.return} Return</button>`;
    } else {
      borrowReturnBtn=`<button class="ctx-item" disabled style="opacity:.35;cursor:not-allowed">${SVG.return} Return</button>`;
    }
  }
  const isAdmin = currentUser && currentUser.role === 'admin';
  menu.innerHTML=`
    ${isAdmin ? `<button class="ctx-item" onclick="openEditModal('${esc(fid)}')">${SVG.edit} Edit</button>` : ''}
    ${borrowReturnBtn}
    ${isAdmin ? `<div style="border-top:1px solid var(--border);margin:4px 0"></div>
    <button class="ctx-item danger" onclick="openDelete('${esc(fid)}')">${SVG.trash} Delete</button>` : ''}`;
  document.body.appendChild(menu);
  const rect=menu.getBoundingClientRect();
  if(rect.right>window.innerWidth)menu.style.left=(e.clientX-rect.width)+'px';
  if(rect.bottom>window.innerHeight)menu.style.top=(e.clientY-rect.height)+'px';
}
function closeCtxMenu(){const m=document.getElementById('ctx-menu');if(m)m.remove();ctxFileId=null;}
document.addEventListener('click',()=>closeCtxMenu());
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeCtxMenu()});

// SECTION 19 — EDIT FOLDER MODAL (Admin only)
//
//   openEditModal(fid) — finds the file, closes the ctx menu,
//                        sets modal='edit', calls render(), then
//                        manually sets input values via setVal()

//                        folder's current data. Same fields as

//   doEdit()           — reads all form fields, validates required

// EDIT MODAL
function openEditModal(fid){
  selectedFile=files.find(f=>f.id===fid);closeCtxMenu();modal='edit';render();

  setVal('e-caseno',selectedFile.caseNo);
  setVal('e-court',selectedFile.court);
  setVal('e-nature',selectedFile.caseNature);
}

function doEdit(){
  const name=document.getElementById('e-name').value.trim();
  const loc=document.getElementById('e-loc').value.trim();

  const notes=document.getElementById('a-notes').value.trim();

  if(!caseFolderNo){err.textContent='Case Folder No. is required.';return}
  if(files.find(f=>f.id===caseFolderNo)){err.textContent='A folder with that Case Folder No. already exists.';return}
  if(!name){err.textContent='Case Title is required.';return}
  if(!loc){err.textContent='Location is required.';return}
  if(!caseNo){err.textContent='Case No. is required.';return}
  if(!court){err.textContent='Court / Agency is required.';return}
  if(!caseNature){err.textContent='Nature of Case is required.';return}

  addFileToDb(newFolder);
  selectedFile=newFolder;

// Compute lawyer abbreviation: each word → first letter + "."
function lawyerAbbrev(name){
  if(!name) return '';
  return name.trim().split(/\s+/).map(w=>w[0].toUpperCase()+'.').join(' ');
}
// Display name used in borrow/return boxes
function displayName(u){
  if(!u) return '';
  if(u.abbrev) return u.abbrev;
  if(u.role!=='admin' && u.title==='Lawyer') return lawyerAbbrev(u.name);
  return u.name;
}
// Get display name from a borrower name string (looks up user by email then name, falls back to stored name)
function borrowerDisplay(nameStr, emailStr){
  if(!nameStr) return '';
  // Prefer lookup by email (survives renames)
  const u = (emailStr && users.find(u => u.email === emailStr))
          || users.find(u => u.name === nameStr);
  if(u) return displayName(u);
  return nameStr; // unknown user, show as-is
}

// ============================================================
// SECTION 22 — AVATAR & BANNER IMAGE UPLOAD / CROP SYSTEM
//
//   _abbrevManuallyEdited — flag: true when the user has typed
//                           in the abbrev field manually, so
//                           onNameFieldChange() stops auto-updating it.
//   updateAbbrevPreview() — rebuilds the abbrev field from the
//                           First + Last name fields in real-time.
//
//   Avatar/Banner context menus (static HTML below renderAccountPage):
//     Right-click on avatar/banner → shows floating <div> with
//     "Change Picture" / "Remove Picture" options.
//   Lightbox (left-click) — shows the full-res image in a
//     centered overlay with a close button.
//   Crop overlay — canvas-based image crop tool:
//     • handleImgFileChosen() — reads the selected file as
//       a DataURL and opens the crop overlay.
//     • _openCropOverlay(src) — sets up the canvas, loads
//       the image, calculates minimum zoom so image always
//       fills the crop zone, attaches mouse/touch/wheel events.
//     • _drawCrop() — redraws the crop preview:
//         1. Draw full image dimmed
//         2. Black semi-transparent overlay
//         3. Re-draw image at full brightness clipped to the
//            rounded crop zone (square for avatar, widescreen
//            strip for banner)
//         4. Draw a soft border around the crop zone.
//     • _clampPos() — prevents dragging the image so the
//       crop window shows empty space outside the image.
//     • Mouse/touch/wheel handlers — drag to reposition,
//       scroll/pinch to zoom, slider to zoom.
//     • applyCrop() — exports the crop zone to a new
//       offscreen canvas, converts to JPEG base64, and saves
//       to currentUser.avatar (or .banner).
//     • deleteAvatar() / deleteBanner() — nulls the stored image.
// ============================================================
let _abbrevManuallyEdited = false;

function updateAbbrevPreview(){
  // Only auto-update if user hasn't manually edited the abbrev
  if(_abbrevManuallyEdited) return;
  const first = (document.getElementById('ap-firstname')?.value || '').trim();
  const last  = (document.getElementById('ap-lastname')?.value  || '').trim();
  const abbrevEl = document.getElementById('ap-abbrev');
  if(!abbrevEl) return;
  const fullName = [first, last].filter(Boolean).join(' ');
  abbrevEl.value = fullName ? lawyerAbbrev(fullName) : '';
}

function onAbbrevManualEdit(){
  _abbrevManuallyEdited = true;
}

function onNameFieldChange(){
  // When name changes, reset manual flag and auto-update abbrev
  _abbrevManuallyEdited = false;
  updateAbbrevPreview();
}

function doSaveName(){
  const firstEl  = document.getElementById('ap-firstname');
  const lastEl   = document.getElementById('ap-lastname');
  const abbrevEl = document.getElementById('ap-abbrev');
  const msgEl    = document.getElementById('ap-msg');
  if(!firstEl || !msgEl) return;
  const first = firstEl.value.trim();
  const last  = lastEl ? lastEl.value.trim() : '';
  if(!first){ msgEl.style.color='var(--red)'; msgEl.textContent='First name is required.'; return; }
  const name = [first, last].filter(Boolean).join(' ');
  // Abbrev: only relevant for Lawyers
  const isLawyer = currentUser.title === 'Lawyer';
  const rawAbbrev = abbrevEl ? abbrevEl.value.trim() : '';
  const abbrev = isLawyer ? (rawAbbrev || lawyerAbbrev(name)) : '';
  const oldName = currentUser.name; // capture BEFORE any mutation
  currentUser.name   = name;
  currentUser.abbrev = abbrev;
  const u = users.find(u => u.id === currentUser.id);
  if(u){ u.name = name; u.abbrev = abbrev; }
  // Update stored borrower name in all history entries
  // Match by email (new entries) OR by old name string (legacy entries without email)
  files.forEach(f => {
    let touched=false;
    if(f.borrower && (f.borrowerEmail === currentUser.email || f.borrower === oldName)){ f.borrower = name; touched=true; }
    (f.borrowHistory||[]).forEach(h => {
      if(h.borrowerEmail === currentUser.email || h.borrower === oldName) {
        h.borrower = name;
        if(!h.borrowerEmail) h.borrowerEmail = currentUser.email; // backfill email for future renames
        touched=true;
      }
    });
    if(touched) syncFileToDb(f);
  });
  syncUserToDb(currentUser);
  msgEl.style.color='var(--green)';
  msgEl.textContent=isLawyer?`Name saved as "${name}" · Abbrev: ${abbrev}`:`Name saved as "${name}"`;
  setTimeout(()=>render(), 1200);
}

function doChangePassword(){
  const cur = (document.getElementById('pw-cur')?.value || '');
  const nw  = (document.getElementById('pw-new')?.value || '');
  const cf  = (document.getElementById('pw-conf')?.value || '');
  const msgEl = document.getElementById('pw-msg');
  if(!msgEl) return;
  msgEl.textContent = '';
  if(nw.length < 6){
    msgEl.style.color='var(--red)'; msgEl.textContent='New password must be at least 6 characters.'; return;
  }
  if(nw !== cf){
    msgEl.style.color='var(--red)'; msgEl.textContent='Passwords do not match.'; return;
  }
  const cred=firebase.auth.EmailAuthProvider.credential(currentUser.email, cur);
  auth.currentUser.reauthenticateWithCredential(cred).then(()=>{
    return auth.currentUser.updatePassword(nw);
  }).then(()=>{
    msgEl.style.color='var(--green)';
    msgEl.textContent='Password updated successfully!';
    ['pw-cur','pw-new','pw-conf'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
  }).catch(err=>{
    msgEl.style.color='var(--red)';
    msgEl.textContent = err.code==='auth/wrong-password' ? 'Current password is incorrect.' : (err.message||'Could not update password.');
  });
}

function saveAdminUserEdit(uid){
  const roleEl=document.getElementById('adm-edit-role-'+uid);
  const u=users.find(u=>u.id===uid);
  if(!u) return;
  if(roleEl){
    const rv=roleEl.value; // 'lawyer' or 'staff'
    u.role='user'; // non-admin
    u.title=rv==='lawyer'?'Lawyer':'Staff';
    // regenerate abbrev for lawyers
    if(rv==='lawyer') u.abbrev=u.abbrev||lawyerAbbrev(u.name);
    else u.abbrev='';
  }
  syncUserToDb(u);
  adminEditUserId=null;
  render();
}

function admSetRole(uid, role, btn){
  document.getElementById('adm-edit-role-'+uid).value=role;
  btn.closest('.role-picker').querySelectorAll('.role-opt').forEach(b=>b.classList.remove('role-opt-active'));
  btn.classList.add('role-opt-active');
}

// Approves a pending registration: reads the chosen role (Lawyer/Staff)
// from the hidden input next to the picker, flips role 'pending'->'user',
// sets the title, and syncs to Firestore. Allowed by the same
// isAdmin(database) branch in the rules that lets admins edit any user.
function approveUser(uid){
  const roleEl=document.getElementById('adm-edit-role-'+uid);
  const u=users.find(u=>u.id===uid);
  if(!u) return;
  const rv=roleEl?roleEl.value:'lawyer'; // 'lawyer' or 'staff'
  u.role='user';
  u.title=rv==='lawyer'?'Lawyer':'Staff';
  if(rv==='lawyer') u.abbrev=u.abbrev||lawyerAbbrev(u.name);
  else u.abbrev='';
  syncUserToDb(u);
  adminEditUserId=null;
  render();
  showResetEmailPrompt(u.email, u.name);
}

// Popup asking whether to send the new user a password-reset email,
// shown right after their account is approved.
function showResetEmailPrompt(email, name){
  if(!email) return;
  if(document.getElementById('reset-email-overlay')) return;
  const overlay=document.createElement('div');
  overlay.id='reset-email-overlay';
  overlay.style.cssText='position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)';
  overlay.innerHTML=`
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2rem 2rem 1.5rem;max-width:360px;width:90%;box-shadow:0 32px 72px rgba(0,0,0,.75);display:flex;flex-direction:column;align-items:center;gap:.75rem;text-align:center">
      <div style="width:52px;height:52px;border-radius:50%;background:rgba(201,162,39,.12);border:1px solid rgba(201,162,39,.3);display:flex;align-items:center;justify-content:center;margin-bottom:.1rem">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><path d="M22 6l-10 7L2 6"/></svg>
      </div>
      <div style="font-size:16px;font-weight:800;letter-spacing:-.3px">Send Password Reset?</div>
      <div style="font-size:13px;color:var(--muted);line-height:1.6"><strong style="color:var(--text)">${esc(name)}</strong> has been approved. Send a password reset email to <span style="color:var(--accent2);font-weight:700">${esc(email)}</span> now?</div>
      <div style="display:flex;gap:.65rem;width:100%;margin-top:.5rem">
        <button onclick="confirmSendResetEmail('${esc(email)}')" style="flex:1;padding:10px 0;border-radius:11px;background:var(--accent);border:none;color:#fff;font-weight:700;font-size:13px;cursor:pointer;transition:all .15s" onmouseover="this.style.background='var(--accent2)'" onmouseout="this.style.background='var(--accent)'">Yes, send it</button>
        <button onclick="removeResetEmailOverlay()" style="flex:1;padding:10px 0;border-radius:11px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-weight:700;font-size:13px;cursor:pointer">No, skip</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e=>{ if(e.target===overlay) removeResetEmailOverlay(); });
}
function removeResetEmailOverlay(){
  const overlay=document.getElementById('reset-email-overlay');
  if(overlay) overlay.remove();
}
function confirmSendResetEmail(email){
  removeResetEmailOverlay();
  auth.sendPasswordResetEmail(email).then(()=>{
    showToast(`Password reset email sent to ${email}`, 'success');
  }).catch(e=>{
    console.error('sendPasswordResetEmail failed:', e);
    showToast(`Could not send reset email: ${e.message||e}`, 'error');
  });
}

// ── Lightweight toast notification ───────────────────────────────────────────
// Used to give visible confirmation for actions whose result wouldn't
// otherwise show up anywhere (e.g. whether a password reset email
// actually went out) — Firebase calls like sendPasswordResetEmail()
// resolve/reject silently with nothing in the UI unless we surface it.
function showToast(message, type){
  const existing=document.getElementById('ft-toast');
  if(existing) existing.remove();
  const colors = type==='error'
    ? {bg:'rgba(192,57,43,.97)', border:'rgba(255,255,255,.15)'}
    : {bg:'rgba(34,150,94,.97)', border:'rgba(255,255,255,.15)'};
  const toast=document.createElement('div');
  toast.id='ft-toast';
  toast.style.cssText=`position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10000;background:${colors.bg};border:1px solid ${colors.border};color:#fff;padding:11px 20px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 12px 32px rgba(0,0,0,.35);max-width:90vw;text-align:center;transition:opacity .25s,transform .25s;opacity:0`;
  toast.textContent=message;
  document.body.appendChild(toast);
  requestAnimationFrame(()=>{ toast.style.opacity='1'; });
  setTimeout(()=>{
    toast.style.opacity='0';
    toast.style.transform='translateX(-50%) translateY(8px)';
    setTimeout(()=>toast.remove(), 300);
  }, 3800);
}

// Rejects a pending registration by deleting their Firestore profile
// (allowed for admins per the users/{uid} delete rule). This blocks
// them from signing in — doLogin() requires a matching profile doc —
// but cannot remove the underlying Firebase Auth account from client
// code; if you need that too, it'd require a Cloud Function or the
// Admin SDK run from a trusted backend.
// ── Admin: Reject Pending Registration Flow ──────────────────────────────────
// Mirrors the Delete User Flow's look/steps, with wording tailored to a
// pending registration request instead of an existing staff/lawyer account.
// Step 1: Warning popup — "You're about to reject X's request, proceed?"
function rejectUser(uid, name){
  if(document.getElementById('reject-user-overlay')) return;
  const overlay=document.createElement('div');
  overlay.id='reject-user-overlay';
  overlay.style.cssText='position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)';
  overlay.innerHTML=`
    <div style="background:var(--surface);border:1px solid rgba(192,57,43,.2);border-radius:20px;padding:2rem 2rem 1.5rem;max-width:360px;width:90%;box-shadow:0 32px 72px rgba(0,0,0,.75);display:flex;flex-direction:column;align-items:center;gap:.75rem;text-align:center">
      <div style="width:52px;height:52px;border-radius:50%;background:rgba(192,57,43,.12);border:1px solid rgba(192,57,43,.3);display:flex;align-items:center;justify-content:center;margin-bottom:.1rem">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      </div>
      <div style="font-size:16px;font-weight:800;color:var(--red);letter-spacing:-.3px">Reject Request</div>
      <div style="font-size:13px;color:var(--muted);line-height:1.6">You're about to reject <strong style="color:var(--text)">${esc(name)}</strong>'s registration request, proceed?</div>
      <div style="display:flex;gap:.65rem;width:100%;margin-top:.5rem">
        <button onclick="removeRejectUserOverlay();showRejectPasswordPrompt('${uid}','${esc(name)}')" style="flex:1;padding:10px 0;border-radius:11px;background:#22c55e18;border:1px solid rgba(34,197,94,.3);color:var(--green);font-weight:700;font-size:13px;cursor:pointer;transition:all .15s" onmouseover="this.style.background='rgba(34,197,94,.28)'" onmouseout="this.style.background='#22c55e18'">Yes</button>
        <button onclick="removeRejectUserOverlay()" style="flex:1;padding:10px 0;border-radius:11px;background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.28);color:var(--red);font-weight:700;font-size:13px;cursor:pointer;transition:all .15s" onmouseover="this.style.background='rgba(192,57,43,.2)'" onmouseout="this.style.background='rgba(192,57,43,.1)'">No</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e=>{ if(e.target===overlay) removeRejectUserOverlay(); });
}

// Step 2: Password confirmation popup
function showRejectPasswordPrompt(uid, name){
  if(document.getElementById('reject-user-overlay')) return;
  const overlay=document.createElement('div');
  overlay.id='reject-user-overlay';

// Step 3: Re-authenticate then reject; on wrong password → retry/cancel popup
async function doRejectUser(uid, name){
  const pwEl=document.getElementById('reject-admin-pw');
  const errEl=document.getElementById('reject-pw-err');
  const pw=(pwEl?pwEl.value:'').trim();
  if(!pw){ if(errEl) errEl.textContent='Please enter your password.'; return; }

  // Re-authenticate admin with Firebase
  try{
    const cred=firebase.auth.EmailAuthProvider.credential(currentUser.email, pw);
    await auth.currentUser.reauthenticateWithCredential(cred);
  }catch(e){
    // Wrong password — show retry/cancel popup
    removeRejectUserOverlay();
    showRejectRetryPrompt(uid, name);
    return;
  }

  // Password correct — archive into rejectedUsers (name, email, date —
  // no password) so the admin can see it and restore later if needed,
  // then delete the pending profile so they can't sign in.
  removeRejectUserOverlay();
  const target = users.find(u=>u.id===uid);
  const rejectedEntry = {
    id: uid,
    name: target ? target.name : name,
    email: target ? target.email : '',
    rejectedAt: new Date().toISOString()
  };
  const batch = db.batch();
  batch.set(rejectedUsersCol.doc(uid), rejectedEntry);
  batch.delete(usersCol.doc(uid));
  batch.commit().then(()=>{
    const idx=users.findIndex(u=>u.id===uid);
    if(idx>-1) users.splice(idx,1);
    if(!rejectedUsers.find(r=>r.id===uid)) rejectedUsers.push(rejectedEntry);
    if(adminEditUserId===uid) adminEditUserId=null;
    render();
  }).catch(e=>console.error('doRejectUser failed:',e));
}

// ── Admin: Restore a Rejected Account ────────────────────────────────────────
// Undoes a rejection: recreates the person's Firestore profile as
// 'pending' (their underlying Auth account was never deleted, so they
// can sign back in immediately and land on the pending-approval screen,
// same as a fresh registration) and removes their rejectedUsers entry.
// Also fires a password-reset email as a courtesy, in case they don't
// remember their password — harmless if they do, since they can just
// ignore it.
function restoreRejectedUser(uid){
  const entry = rejectedUsers.find(r=>r.id===uid);
  if(!entry) return;
  const profile = {id:uid, name:entry.name, email:entry.email, role:'pending', title:'Pending', avatar:null};
  const batch = db.batch();
  batch.set(usersCol.doc(uid), profile);
  batch.delete(rejectedUsersCol.doc(uid));
  batch.commit().then(()=>{
    // Update the local arrays immediately — same pattern doRejectUser()
    // uses — instead of waiting on the live onSnapshot listener to catch
    // up. Without this, there's a brief window where the write has
    // already succeeded but the in-memory arrays render() reads from
    // still reflect the old state, which is what made a restored account
    // seem to vanish until the page was refreshed.
    const ridx = rejectedUsers.findIndex(r=>r.id===uid);
    if(ridx>-1) rejectedUsers.splice(ridx,1);
    const uidx = users.findIndex(u=>u.id===uid);
    if(uidx>-1) users[uidx]=profile; else users.push(profile);
    render();
    if(entry.email){
      auth.sendPasswordResetEmail(entry.email).then(()=>{
        showToast(`Password reset email sent to ${entry.email}`, 'success');
      }).catch(e=>{
        console.error('reset email failed:', e);
        showToast(`Could not send reset email: ${e.message||e}`, 'error');
      });
    }
  }).catch(e=>console.error('restoreRejectedUser failed:',e));
}

// ── File chosen → load into crop overlay ──
let _cropTarget = 'avatar'; // 'avatar' | 'banner'
let _cropSrc    = null;     // full Image object
let _cx = 0, _cy = 0;       // image centre in canvas CSS px
let _scale = 1, _minScale = 1;
let _drag = false, _lastX = 0, _lastY = 0;
let _pinchDist = 0;

function handleImgFileChosen(e){
  const file = e.target.files[0]; if(!file) return;
  e.target.value = '';
  const reader = new FileReader();
  reader.onload = ev => _openCropOverlay(ev.target.result);
  reader.readAsDataURL(file);
}
